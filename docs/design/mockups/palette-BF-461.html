<!doctype html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>팔레트 SPA — 디자인 mockup (BF-461)</title>

  <!-- 다크 기본값 강제 (flicker 방지) — head 인라인 IIFE -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem("bf-theme");
        var t = saved === "light" || saved === "dark" ? saved : "dark";
        document.documentElement.setAttribute("data-theme", t);
      } catch (_e) {}
    })();
  </script>

  <style>
    /* ============================================================
       디자인 토큰 — 다크 기본값 (BF-461 명세 §2 준거)
    ============================================================ */
    :root {
      /* 폰트 스택 */
      --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI",
        "Pretendard", "Apple SD Gothic Neo", sans-serif;
      --font-mono: ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;

      /* 색상 토큰 — 다크 기본값 */
      --color-bg-canvas:      #0d1117;
      --color-bg-surface:     #161b22;
      --color-bg-subtle:      #1f2530;
      --color-border-default: #262c36;
      --color-border-strong:  #3a4150;
      --color-text-primary:   #e8e8e4;
      --color-text-secondary: #9a9a93;
      --color-text-muted:     #6b6b66;
      --color-accent:         #fb923c;
      --color-accent-hover:   #fdba74;
      --color-accent-active:  #f97316;
      --color-accent-on:      #0d1117;
      --color-danger:         #e55858;
      --color-focus-ring:     rgba(251, 146, 60, 0.55);

      /* 팔레트 전용 토큰 */
      --color-slot-empty:   #1f2530;
      --color-slot-border:  #3a4150;
      --color-copy-glow:    rgba(251, 146, 60, 0.35);
      --color-save-glow:    rgba(251, 146, 60, 0.40);
      --color-hex-display:  #e8e8e4;
      --color-hsl-display:  #9a9a93;

      /* 공간 토큰 */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 24px;
      --space-6: 32px;
      --space-7: 48px;
      --space-8: 64px;

      /* 반경 */
      --radius-sm:   4px;
      --radius-md:   8px;
      --radius-lg:   12px;
      --radius-slot: 10px;

      /* 그림자 */
      --shadow-card:  0 4px 16px rgba(0, 0, 0, 0.32);
      --shadow-copy:  0 4px 12px var(--color-copy-glow);
      --shadow-save:  0 6px 20px var(--color-save-glow);

      /* 모션 */
      --motion-press: 150ms;
      --motion-fast:  120ms;
      --motion-mid:   220ms;
      --ease-out: cubic-bezier(0.2, 0, 0, 1);
      --scale-press: 0.95;
    }

    /* ============================================================
       라이트 모드 오버라이드 (BF-461 명세 §2.1)
    ============================================================ */
    [data-theme="light"] {
      --color-bg-canvas:      #fafaf9;
      --color-bg-surface:     #ffffff;
      --color-bg-subtle:      #f1f1ef;
      --color-border-default: #e5e5e2;
      --color-border-strong:  #d0d0cc;
      --color-text-primary:   #1a1a19;
      --color-text-secondary: #6b6b66;
      --color-text-muted:     #9a9a93;
      --color-accent:         #ea580c;
      --color-accent-hover:   #c2410c;
      --color-accent-active:  #9a3412;
      --color-accent-on:      #ffffff;
      --color-danger:         #d14343;
      --color-focus-ring:     rgba(234, 88, 12, 0.45);

      --color-slot-empty:   #e5e5e2;
      --color-slot-border:  #d0d0cc;
      --color-copy-glow:    rgba(234, 88, 12, 0.20);
      --color-save-glow:    rgba(234, 88, 12, 0.25);
      --color-hex-display:  #1a1a19;
      --color-hsl-display:  #6b6b66;

      --shadow-card: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    /* ============================================================
       리셋 & 베이스
    ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-family: var(--font-sans);
      background-color: var(--color-bg-canvas);
      color: var(--color-text-primary);
      font-size: 15px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    /* ============================================================
       Topbar
    ============================================================ */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      padding: 0 var(--space-5);
      background-color: var(--color-bg-surface);
      border-bottom: 1px solid var(--color-border-default);
    }

    .topbar__title {
      font-size: 20px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--color-text-primary);
      letter-spacing: -0.01em;
    }

    .topbar__actions {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    /* ============================================================
       페이지 컨테이너
    ============================================================ */
    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: var(--space-7) var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
    }

    /* ============================================================
       카드 공통
    ============================================================ */
    .card {
      background-color: var(--color-bg-surface);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: var(--space-5);
    }

    .card__title {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: var(--space-4);
    }

    /* ============================================================
       슬롯 그리드
    ============================================================ */
    .slot-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: var(--space-3);
    }

    /* ============================================================
       컬러 슬롯
    ============================================================ */
    .slot {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    /* 슬롯 색상 박스 */
    .slot__swatch {
      display: block;
      width: 100%;
      height: 110px;
      border-radius: var(--radius-slot);
      border: 1.5px solid var(--color-slot-border);
      background-color: var(--slot-color, var(--color-slot-empty));
      cursor: crosshair;
      transition:
        border-color var(--motion-fast) var(--ease-out),
        box-shadow var(--motion-fast) var(--ease-out);
      position: relative;
      overflow: hidden;
    }

    .slot__swatch:hover {
      border-color: var(--color-border-strong);
      box-shadow: 0 0 0 2px var(--color-focus-ring);
    }

    .slot__swatch:focus-visible {
      outline: 2px solid var(--color-focus-ring);
      outline-offset: 2px;
    }

    /* 슬롯 번호 라벨 */
    .slot__label {
      font-size: 11px;
      font-weight: 500;
      color: var(--color-text-muted);
      text-align: center;
      letter-spacing: 0.04em;
    }

    /* HEX 값 */
    .slot__hex {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--color-hex-display);
      text-transform: uppercase;
      text-align: center;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .slot__hex.is-empty {
      color: var(--color-text-muted);
    }

    /* HSL 값 */
    .slot__hsl {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 400;
      color: var(--color-hsl-display);
      text-align: center;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .slot__hsl.is-empty {
      color: var(--color-text-muted);
    }

    /* 복사 버튼 */
    .slot__copy {
      width: 100%;
      height: 30px;
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      color: var(--color-text-secondary);
      background: transparent;
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition:
        background var(--motion-fast) var(--ease-out),
        box-shadow var(--motion-fast) var(--ease-out),
        color var(--motion-fast) var(--ease-out),
        transform var(--motion-press) var(--ease-out);
    }

    .slot__copy:hover:not(:disabled) {
      background: var(--color-bg-subtle);
      box-shadow: var(--shadow-copy);
      color: var(--color-text-primary);
    }

    .slot__copy:active:not(:disabled) {
      transform: scale(var(--scale-press));
    }

    .slot__copy:focus-visible {
      outline: 2px solid var(--color-focus-ring);
      outline-offset: 2px;
    }

    .slot__copy:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* 복사됨 상태 — JS로 .is-copied 클래스 추가 */
    .slot__copy.is-copied {
      background: rgba(251, 146, 60, 0.12);
      color: var(--color-accent);
      border-color: var(--color-accent);
    }

    [data-theme="light"] .slot__copy.is-copied {
      background: rgba(234, 88, 12, 0.10);
      color: var(--color-accent);
      border-color: var(--color-accent);
    }

    /* hover로 copied 상태 미리보기 (mockup 전용) */
    .slot--demo-copied .slot__copy {
      background: rgba(251, 146, 60, 0.12);
      color: var(--color-accent);
      border-color: var(--color-accent);
    }

    [data-theme="light"] .slot--demo-copied .slot__copy {
      background: rgba(234, 88, 12, 0.10);
    }

    /* ============================================================
       저장 카드
    ============================================================ */
    .save-form {
      display: flex;
      gap: var(--space-2);
      align-items: stretch;
    }

    .save-form__input {
      flex: 1;
      height: 40px;
      padding: 0 var(--space-3);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-primary);
      background-color: var(--color-bg-subtle);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-md);
      outline: none;
      transition: border-color var(--motion-fast) var(--ease-out);
    }

    .save-form__input::placeholder {
      color: var(--color-text-muted);
    }

    .save-form__input:focus {
      border-color: var(--color-border-strong);
      box-shadow: 0 0 0 2px var(--color-focus-ring);
    }

    /* 저장 버튼 (accent) */
    .btn--accent {
      height: 40px;
      padding: 0 var(--space-4);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      color: var(--color-accent-on);
      background-color: var(--color-accent);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      white-space: nowrap;
      transition:
        background-color var(--motion-fast) var(--ease-out),
        box-shadow var(--motion-fast) var(--ease-out),
        transform var(--motion-press) var(--ease-out);
    }

    .btn--accent:hover {
      background-color: var(--color-accent-hover);
      box-shadow: var(--shadow-save);
    }

    .btn--accent:active {
      background-color: var(--color-accent-active);
      transform: scale(var(--scale-press));
      box-shadow: none;
    }

    .btn--accent:focus-visible {
      outline: 2px solid var(--color-focus-ring);
      outline-offset: 2px;
    }

    .btn--accent:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 저장 목록 구분선 */
    .save-divider {
      margin: var(--space-4) 0 var(--space-3);
      border: none;
      border-top: 1px solid var(--color-border-default);
    }

    /* 저장 목록 */
    .save-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* 저장 목록 행 */
    .save-list__item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      min-height: 44px;
      transition: background var(--motion-fast) var(--ease-out);
    }

    .save-list__item:hover {
      background-color: var(--color-bg-subtle);
    }

    .save-list__name {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* 미니 색상 스워치 (5개) */
    .save-list__swatches {
      display: flex;
      gap: 3px;
      align-items: center;
      flex-shrink: 0;
    }

    .save-list__swatch {
      width: 13px;
      height: 13px;
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }

    [data-theme="light"] .save-list__swatch {
      border-color: rgba(0, 0, 0, 0.10);
    }

    /* 저장 목록 액션 버튼 */
    .save-list__actions {
      display: flex;
      gap: var(--space-1);
      flex-shrink: 0;
    }

    .btn--ghost-sm {
      height: 28px;
      padding: 0 var(--space-2);
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      color: var(--color-text-secondary);
      background: transparent;
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-sm);
      cursor: pointer;
      white-space: nowrap;
      transition:
        background var(--motion-fast) var(--ease-out),
        color var(--motion-fast) var(--ease-out);
    }

    .btn--ghost-sm:hover {
      background: var(--color-bg-subtle);
      color: var(--color-text-primary);
    }

    .btn--ghost-sm.btn--danger:hover {
      color: var(--color-danger);
    }

    .btn--ghost-sm:focus-visible {
      outline: 2px solid var(--color-focus-ring);
      outline-offset: 2px;
    }

    /* 빈 저장 상태 */
    .save-list__empty {
      font-size: 12px;
      color: var(--color-text-muted);
      text-align: center;
      padding: var(--space-5) 0;
    }

    /* ============================================================
       topbar ghost 버튼 (theme-toggle)
    ============================================================ */
    .btn--ghost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 36px;
      padding: 0 var(--space-3);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-secondary);
      background: transparent;
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition:
        background var(--motion-fast) var(--ease-out),
        color var(--motion-fast) var(--ease-out);
    }

    .btn--ghost:hover {
      background: var(--color-bg-subtle);
      color: var(--color-text-primary);
    }

    .btn--ghost:focus-visible {
      outline: 2px solid var(--color-focus-ring);
      outline-offset: 2px;
    }

    /* ============================================================
       hint (키보드 단축키 안내)
    ============================================================ */
    .hint {
      font-size: 12px;
      color: var(--color-text-muted);
      text-align: center;
    }

    .hint kbd {
      display: inline-block;
      padding: 1px 5px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--color-text-secondary);
      background: var(--color-bg-subtle);
      border: 1px solid var(--color-border-strong);
      border-radius: 3px;
      vertical-align: baseline;
    }

    /* ============================================================
       모바일 breakpoint (< 640px)
    ============================================================ */
    @media (max-width: 639px) {
      .page {
        padding: var(--space-5) var(--space-3);
      }

      .slot-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      /* 4번·5번 슬롯: 가운데 정렬 (마지막 행 2칸) */
      .slot:nth-child(4) {
        grid-column: 1;
      }
      .slot:nth-child(5) {
        grid-column: 2;
      }

      .slot__swatch {
        height: 80px;
      }

      .slot__hex {
        font-size: 11px;
      }

      .slot__hsl {
        font-size: 9px;
      }

      .save-form {
        flex-direction: column;
      }

      .btn--accent {
        width: 100%;
      }
    }

    /* ============================================================
       reduced-motion
    ============================================================ */
    @media (prefers-reduced-motion: reduce) {
      * {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       Topbar
  ============================================================ -->
  <header class="topbar">
    <h1 class="topbar__title">팔레트</h1>
    <div class="topbar__actions">
      <button
        type="button"
        class="btn--ghost"
        id="theme-toggle"
        aria-label="라이트 테마로 전환"
      >🌙</button>
    </div>
  </header>

  <!-- ============================================================
       Main
  ============================================================ -->
  <main class="page">

    <!-- 컬러 슬롯 카드 -->
    <section class="card palette-card" aria-label="컬러 팔레트">
      <div class="slot-grid">

        <!-- 슬롯 1 — 샘플: #FF5733 -->
        <div class="slot" data-slot="0">
          <button
            class="slot__swatch"
            style="--slot-color: #FF5733;"
            aria-label="색상 1 선택 — 현재 #FF5733"
            title="클릭하여 색상 선택"
          >
            <input type="color" class="slot__input" value="#FF5733" style="position:absolute;opacity:0;width:0;height:0;" tabindex="-1" aria-hidden="true" />
          </button>
          <span class="slot__label">색상 1</span>
          <span class="slot__hex">#FF5733</span>
          <span class="slot__hsl">hsl(11, 100%, 60%)</span>
          <button class="slot__copy" aria-label="색상 1 HEX 복사">복사</button>
        </div>

        <!-- 슬롯 2 — 샘플: #FFC300 -->
        <div class="slot" data-slot="1">
          <button
            class="slot__swatch"
            style="--slot-color: #FFC300;"
            aria-label="색상 2 선택 — 현재 #FFC300"
            title="클릭하여 색상 선택"
          >
            <input type="color" class="slot__input" value="#FFC300" style="position:absolute;opacity:0;width:0;height:0;" tabindex="-1" aria-hidden="true" />
          </button>
          <span class="slot__label">색상 2</span>
          <span class="slot__hex">#FFC300</span>
          <span class="slot__hsl">hsl(46, 100%, 50%)</span>
          <!-- 복사됨 상태 미리보기 -->
          <button class="slot__copy is-copied" aria-label="색상 2 HEX 복사">✓ 복사됨</button>
        </div>

        <!-- 슬롯 3 — 샘플: #28B463 -->
        <div class="slot" data-slot="2">
          <button
            class="slot__swatch"
            style="--slot-color: #28B463;"
            aria-label="색상 3 선택 — 현재 #28B463"
            title="클릭하여 색상 선택"
          >
            <input type="color" class="slot__input" value="#28B463" style="position:absolute;opacity:0;width:0;height:0;" tabindex="-1" aria-hidden="true" />
          </button>
          <span class="slot__label">색상 3</span>
          <span class="slot__hex">#28B463</span>
          <span class="slot__hsl">hsl(140, 62%, 43%)</span>
          <button class="slot__copy" aria-label="색상 3 HEX 복사">복사</button>
        </div>

        <!-- 슬롯 4 — 샘플: #1A73E8 -->
        <div class="slot" data-slot="3">
          <button
            class="slot__swatch"
            style="--slot-color: #1A73E8;"
            aria-label="색상 4 선택 — 현재 #1A73E8"
            title="클릭하여 색상 선택"
          >
            <input type="color" class="slot__input" value="#1A73E8" style="position:absolute;opacity:0;width:0;height:0;" tabindex="-1" aria-hidden="true" />
          </button>
          <span class="slot__label">색상 4</span>
          <span class="slot__hex">#1A73E8</span>
          <span class="slot__hsl">hsl(213, 79%, 51%)</span>
          <button class="slot__copy" aria-label="색상 4 HEX 복사">복사</button>
        </div>

        <!-- 슬롯 5 — 빈 슬롯 (empty state) -->
        <div class="slot" data-slot="4">
          <button
            class="slot__swatch"
            aria-label="색상 5 선택 — 비어있음"
            title="클릭하여 색상 선택"
          >
            <input type="color" class="slot__input" style="position:absolute;opacity:0;width:0;height:0;" tabindex="-1" aria-hidden="true" />
          </button>
          <span class="slot__label">색상 5</span>
          <span class="slot__hex is-empty">—</span>
          <span class="slot__hsl is-empty">—</span>
          <button class="slot__copy" disabled aria-disabled="true" aria-label="색상 5 HEX 복사">복사</button>
        </div>

      </div>
    </section>

    <!-- 저장 카드 -->
    <section class="card save-card" aria-label="팔레트 저장">
      <p class="card__title">저장된 팔레트</p>

      <!-- 저장 폼 -->
      <div class="save-form">
        <input
          type="text"
          id="palette-name"
          class="save-form__input"
          placeholder="팔레트 이름..."
          maxlength="40"
          autocomplete="off"
        />
        <button
          type="button"
          class="btn--accent"
          id="btn-save"
          aria-label="팔레트 저장"
        >저장</button>
      </div>

      <hr class="save-divider" />

      <!-- 저장 목록 — 샘플 2건 -->
      <ul class="save-list" id="save-list" aria-label="저장된 팔레트 목록">

        <li class="save-list__item">
          <span class="save-list__name">여름 팔레트</span>
          <div class="save-list__swatches" aria-hidden="true">
            <span class="save-list__swatch" style="background:#FF5733;"></span>
            <span class="save-list__swatch" style="background:#FFC300;"></span>
            <span class="save-list__swatch" style="background:#28B463;"></span>
            <span class="save-list__swatch" style="background:#1A73E8;"></span>
            <span class="save-list__swatch" style="background:#8E44AD;"></span>
          </div>
          <div class="save-list__actions">
            <button type="button" class="btn--ghost-sm" aria-label="여름 팔레트 불러오기">불러오기</button>
            <button type="button" class="btn--ghost-sm btn--danger" aria-label="여름 팔레트 삭제">삭제</button>
          </div>
        </li>

        <li class="save-list__item">
          <span class="save-list__name">모노크롬 다크</span>
          <div class="save-list__swatches" aria-hidden="true">
            <span class="save-list__swatch" style="background:#1a1a1a;"></span>
            <span class="save-list__swatch" style="background:#2d2d2d;"></span>
            <span class="save-list__swatch" style="background:#555555;"></span>
            <span class="save-list__swatch" style="background:#aaaaaa;"></span>
            <span class="save-list__swatch" style="background:#f5f5f5;"></span>
          </div>
          <div class="save-list__actions">
            <button type="button" class="btn--ghost-sm" aria-label="모노크롬 다크 불러오기">불러오기</button>
            <button type="button" class="btn--ghost-sm btn--danger" aria-label="모노크롬 다크 삭제">삭제</button>
          </div>
        </li>

      </ul>
    </section>

    <!-- 키보드 힌트 -->
    <p class="hint">
      <kbd>1</kbd>~<kbd>5</kbd> 슬롯 선택 &nbsp;·&nbsp;
      <kbd>C</kbd> HEX 복사 &nbsp;·&nbsp;
      <kbd>T</kbd> 테마 토글
    </p>

  </main>

  <!-- ============================================================
       Mockup 인터랙션 (테마 토글 + 슬롯 기본 동작)
       ⚠ 이 JS는 mockup 시각 시뮬레이션용 — dev 산출물이 아님
  ============================================================ -->
  <script>
    // --- 테마 토글 ---
    var btnTheme = document.getElementById("theme-toggle");

    function getTheme() {
      return document.documentElement.getAttribute("data-theme") === "light"
        ? "light" : "dark";
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      btnTheme.textContent = theme === "dark" ? "🌙" : "☀";
      btnTheme.setAttribute(
        "aria-label",
        theme === "dark" ? "라이트 테마로 전환" : "다크 테마로 전환"
      );
    }

    btnTheme.addEventListener("click", function () {
      var next = getTheme() === "dark" ? "light" : "dark";
      applyTheme(next);
      try { localStorage.setItem("bf-theme", next); } catch (_e) {}
    });

    // 저장된 테마 적용 (head IIFE 이후 아이콘 동기화)
    applyTheme(getTheme());

    // --- 슬롯 색상 선택 (mockup 시뮬레이션) ---
    function hexToHsl(hex) {
      var r = parseInt(hex.slice(1, 3), 16) / 255;
      var g = parseInt(hex.slice(3, 5), 16) / 255;
      var b = parseInt(hex.slice(5, 7), 16) / 255;
      var max = Math.max(r, g, b), min = Math.min(r, g, b);
      var h, s, l = (max + min) / 2;
      if (max === min) {
        h = s = 0;
      } else {
        var d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
          case g: h = ((b - r) / d + 2) / 6; break;
          case b: h = ((r - g) / d + 4) / 6; break;
        }
      }
      return "hsl(" + Math.round(h * 360) + ", " + Math.round(s * 100) + "%, " + Math.round(l * 100) + "%)";
    }

    document.querySelectorAll(".slot").forEach(function (slot) {
      var swatch = slot.querySelector(".slot__swatch");
      var input = slot.querySelector(".slot__input");
      var hexEl = slot.querySelector(".slot__hex");
      var hslEl = slot.querySelector(".slot__hsl");
      var copyBtn = slot.querySelector(".slot__copy");

      // swatch 클릭 → color picker 트리거
      swatch.addEventListener("click", function () {
        input.click();
      });

      // color input 변경 → 슬롯 갱신
      input.addEventListener("input", function () {
        var hex = input.value.toUpperCase();
        swatch.style.setProperty("--slot-color", hex);
        swatch.setAttribute("aria-label", "색상 선택 — 현재 " + hex);
        hexEl.textContent = hex;
        hexEl.classList.remove("is-empty");
        hslEl.textContent = hexToHsl(input.value);
        hslEl.classList.remove("is-empty");
        copyBtn.disabled = false;
        copyBtn.removeAttribute("aria-disabled");
      });

      // 복사 버튼
      copyBtn.addEventListener("click", function () {
        var hex = hexEl.textContent;
        if (!hex || hex === "—") return;
        try {
          navigator.clipboard.writeText(hex).catch(function () {});
        } catch (_e) {}
        copyBtn.textContent = "✓ 복사됨";
        copyBtn.classList.add("is-copied");
        setTimeout(function () {
          copyBtn.textContent = "복사";
          copyBtn.classList.remove("is-copied");
        }, 1500);
      });
    });

    // --- 저장 버튼 활성화 (이름 입력 시) ---
    var paletteName = document.getElementById("palette-name");
    var btnSave = document.getElementById("btn-save");

    function updateSaveBtn() {
      btnSave.disabled = paletteName.value.trim().length === 0;
    }

    paletteName.addEventListener("input", updateSaveBtn);
    updateSaveBtn();

    // --- 키보드 단축키 ---
    document.addEventListener("keydown", function (e) {
      // T: 테마 토글
      if (e.key === "t" || e.key === "T") {
        if (document.activeElement.tagName !== "INPUT") {
          var next = getTheme() === "dark" ? "light" : "dark";
          applyTheme(next);
          try { localStorage.setItem("bf-theme", next); } catch (_e) {}
        }
      }
      // 1~5: 해당 슬롯 color picker
      if (e.key >= "1" && e.key <= "5") {
        if (document.activeElement.tagName !== "INPUT") {
          var idx = parseInt(e.key) - 1;
          var inputs = document.querySelectorAll(".slot__input");
          if (inputs[idx]) inputs[idx].click();
        }
      }
    });
  </script>

</body>
</html>
