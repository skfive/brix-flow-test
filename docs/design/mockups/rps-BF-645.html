<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가위바위보 UI/UX Mockup — BF-645</title>
  <style>
    /* =========================================================
       디자인 토큰 (rps-BF-645.md §2 기준)
       ========================================================= */
    :root {
      /* 공통 베이스 (다크 기본) */
      --color-bg-canvas:      #0F1115;
      --color-bg-surface:     #171A21;
      --color-bg-subtle:      #1E222B;
      --color-border-default: #262B36;
      --color-border-strong:  #3A4150;
      --color-text-primary:   #E8E8E4;
      --color-text-secondary: #9A9A93;
      --color-text-muted:     #6B6B66;
      --color-accent:         #5B82F0;
      --color-danger:         #E55858;

      /* 공간 토큰 */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 24px;
      --space-6: 32px;
      --space-7: 48px;

      /* 반경 */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;

      /* 폰트 */
      --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI",
                   "Pretendard", "Apple SD Gothic Neo", sans-serif;
      --font-mono: ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;

      /* RPS 결과 컬러 */
      --rps-win:       #28C840;
      --rps-win-bg:    #0A1F0E;
      --rps-win-glow:  rgba(40, 200, 64, 0.30);
      --rps-lose:      #E82828;
      --rps-lose-bg:   #1F0A0A;
      --rps-lose-glow: rgba(232, 40, 40, 0.30);
      --rps-draw:      #F5C400;
      --rps-draw-bg:   #1F1900;
      --rps-draw-glow: rgba(245, 196, 0, 0.25);

      /* RPS 선택지 컬러 */
      --rps-scissors:    #F5C400;
      --rps-scissors-bg: #1F1900;
      --rps-rock:        #9A9A93;
      --rps-rock-bg:     #1A1C22;
      --rps-paper:       #5B82F0;
      --rps-paper-bg:    #0A1020;

      /* 카드 */
      --card-idle-bg:     #1E222B;
      --card-idle-border: #3A4150;

      /* CPU thinking */
      --thinking-dot-color: #9A9A93;
    }

    /* ========== 라이트 테마 오버라이드 ========== */
    [data-theme="light"] {
      --color-bg-canvas:      #FAFAF9;
      --color-bg-surface:     #FFFFFF;
      --color-bg-subtle:      #F1F1EF;
      --color-border-default: #E5E5E2;
      --color-border-strong:  #D5D5D0;
      --color-text-primary:   #1A1A19;
      --color-text-secondary: #6B6B66;
      --color-accent:         #3563E9;
      --color-danger:         #D14343;
      --card-idle-bg:         #F1F1EF;
      --card-idle-border:     #D5D5D0;
      --rps-win-bg:   #E8F9EC;
      --rps-lose-bg:  #FDE8E8;
      --rps-draw-bg:  #FDF8E1;
      --rps-scissors-bg: #FDF8E1;
      --rps-rock-bg:     #F1F1EF;
      --rps-paper-bg:    #EEF2FD;
    }

    /* ========== 리셋 & 베이스 ========== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--color-bg-canvas);
      color: var(--color-text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.2s, color 0.2s;
    }

    /* ========== Header ========== */
    .app-header {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-5);
      background: var(--color-bg-surface);
      border-bottom: 1px solid var(--color-border-default);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .app-header__logo {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .app-header__icons {
      font-size: 20px;
      letter-spacing: -2px;
    }
    .app-header__title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
    }
    .theme-toggle {
      background: var(--color-bg-subtle);
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-md);
      color: var(--color-text-primary);
      cursor: pointer;
      font-size: 18px;
      width: 40px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .theme-toggle:hover { background: var(--color-border-default); }
    .theme-toggle:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* ========== 게임 메인 ========== */
    .game {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-5);
      padding: var(--space-6) var(--space-4);
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }

    /* ========== 점수판 ========== */
    .scoreboard {
      display: flex;
      align-items: center;
      justify-content: space-around;
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-lg);
      padding: var(--space-4) var(--space-5);
      width: 100%;
      max-width: 420px;
    }
    .score-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-1);
      min-width: 80px;
    }
    .score-item__count {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      transition: transform 0.15s;
    }
    .score-item[data-type="win"]  .score-item__count { color: var(--rps-win); }
    .score-item[data-type="draw"] .score-item__count { color: var(--rps-draw); }
    .score-item[data-type="lose"] .score-item__count { color: var(--rps-lose); }
    .score-item__label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: var(--color-text-secondary);
      text-transform: uppercase;
    }
    .score-divider {
      width: 1px;
      height: 44px;
      background: var(--color-border-default);
    }
    @keyframes scorePop {
      0%   { transform: scale(1.0); }
      40%  { transform: scale(1.3); }
      100% { transform: scale(1.0); }
    }
    .score-pop { animation: scorePop 0.25s ease-out; }

    /* ========== 배틀 영역 ========== */
    .battle-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-5);
      width: 100%;
    }

    /* ========== 선택지 카드 ========== */
    .choice-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 160px;
      height: 180px;
      background: var(--card-idle-bg);
      border: 2px solid var(--card-idle-border);
      border-radius: var(--radius-lg);
      gap: var(--space-2);
      transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
      position: relative;
      overflow: hidden;
    }
    .choice-card__icon {
      font-size: 64px;
      line-height: 1;
      transition: transform 0.3s;
    }
    .choice-card__label {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-secondary);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .choice-card__name {
      font-size: 14px;
      font-weight: 700;
      color: var(--color-text-primary);
      min-height: 20px;
    }

    /* 카드 — thinking 상태 */
    .choice-card[data-state="thinking"] {
      border-style: dashed;
    }

    /* 카드 — 게임 상태별 글로우 */
    .game[data-game-state="result-win"] .choice-card[data-owner="player"] {
      border-color: var(--rps-win);
      box-shadow: 0 0 20px var(--rps-win-glow), 0 0 40px rgba(40,200,64,0.12);
    }
    .game[data-game-state="result-lose"] .choice-card[data-owner="cpu"] {
      border-color: var(--rps-lose);
      box-shadow: 0 0 20px var(--rps-lose-glow), 0 0 40px rgba(232,40,40,0.12);
    }
    .game[data-game-state="result-draw"] .choice-card {
      border-color: var(--rps-draw);
      box-shadow: 0 0 16px var(--rps-draw-glow);
    }

    /* CPU 카드 flipIn */
    @keyframes flipIn {
      0%   { transform: perspective(800px) rotateY(90deg); opacity: 0; }
      100% { transform: perspective(800px) rotateY(0deg);  opacity: 1; }
    }
    .flip-in { animation: flipIn 0.3s ease-out; }

    /* CPU thinking 점 */
    .thinking-dots {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 32px;
      line-height: 1;
    }
    .thinking-dots span {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--thinking-dot-color);
      animation: dotPulse 1.2s infinite ease-in-out;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50%       { opacity: 1.0; transform: scale(1.1); }
    }

    /* ========== VS 구분자 ========== */
    .vs-divider {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--color-bg-subtle);
      border: 2px solid var(--color-border-default);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: var(--color-text-secondary);
      flex-shrink: 0;
      letter-spacing: 1px;
    }

    /* ========== 결과 배너 ========== */
    .result-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      min-height: 52px;
      padding: var(--space-3) var(--space-6);
      border-radius: var(--radius-lg);
      border: 1px solid transparent;
      background: transparent;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 3px;
      transition: background 0.3s, border-color 0.3s, color 0.3s;
      width: 100%;
      max-width: 320px;
      visibility: hidden;
      opacity: 0;
    }
    .result-banner.visible {
      visibility: visible;
      animation: slideUp 250ms ease-out forwards;
    }
    @keyframes slideUp {
      from { transform: translateY(8px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }
    .result-banner[data-result="win"] {
      background: var(--rps-win-bg);
      border-color: var(--rps-win);
      color: var(--rps-win);
    }
    .result-banner[data-result="lose"] {
      background: var(--rps-lose-bg);
      border-color: var(--rps-lose);
      color: var(--rps-lose);
    }
    .result-banner[data-result="draw"] {
      background: var(--rps-draw-bg);
      border-color: var(--rps-draw);
      color: var(--rps-draw);
    }
    .result-banner__icon { font-size: 28px; }
    .result-banner__text { font-size: 26px; }

    /* ========== 선택 버튼 패널 ========== */
    .choice-panel {
      display: flex;
      gap: var(--space-4);
      justify-content: center;
      width: 100%;
    }
    .choice-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      width: 130px;
      height: 96px;
      background: var(--color-bg-surface);
      border: 2px solid var(--color-border-strong);
      border-radius: var(--radius-lg);
      cursor: pointer;
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      transition: background 0.15s, border-color 0.15s, transform 0.1s, opacity 0.2s;
    }
    .choice-btn:hover:not(:disabled) { transform: translateY(-2px); }
    .choice-btn:active:not(:disabled) { transform: scale(0.95); }
    .choice-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .choice-btn:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    .choice-btn[data-choice="scissors"]:hover:not(:disabled) {
      background: var(--rps-scissors-bg);
      border-color: var(--rps-scissors);
    }
    .choice-btn[data-choice="rock"]:hover:not(:disabled) {
      background: var(--rps-rock-bg);
      border-color: var(--rps-rock);
    }
    .choice-btn[data-choice="paper"]:hover:not(:disabled) {
      background: var(--rps-paper-bg);
      border-color: var(--rps-paper);
    }

    .choice-btn__icon { font-size: 30px; line-height: 1; }
    .choice-btn__name { font-size: 14px; font-weight: 700; }

    /* thinking 중 버튼 비활성 */
    .game[data-game-state="thinking"] .choice-btn {
      opacity: 0.45;
      pointer-events: none;
    }

    /* ========== 리셋 버튼 ========== */
    .reset-btn {
      background: transparent;
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-md);
      color: var(--color-text-secondary);
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 12px;
      padding: 0 var(--space-3);
      height: 32px;
      transition: border-color 0.15s, color 0.15s;
    }
    .reset-btn:hover {
      border-color: var(--color-danger);
      color: var(--color-danger);
    }
    .reset-btn:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* ========== 도움말 ========== */
    .keyboard-hint {
      font-size: 12px;
      color: var(--color-text-muted);
      text-align: center;
    }
    kbd {
      background: var(--color-bg-subtle);
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-sm);
      padding: 1px 5px;
      font-family: var(--font-mono);
      font-size: 11px;
    }

    /* ========== 반응형 ========== */
    @media (max-width: 639px) {
      .battle-area {
        flex-direction: column;
        gap: var(--space-3);
      }
      .choice-card {
        width: 130px;
        height: 150px;
      }
      .choice-card__icon { font-size: 52px; }
      .vs-divider {
        width: 44px;
        height: 44px;
        font-size: 13px;
      }
      .choice-btn {
        width: 100px;
        height: 80px;
      }
      .choice-btn__icon { font-size: 24px; }
      .scoreboard { max-width: 100%; }
    }
  </style>
</head>
<body data-theme="dark">

  <!-- ========== Header ========== -->
  <header class="app-header">
    <div class="app-header__logo">
      <span class="app-header__icons" aria-hidden="true">✊✌️🖐</span>
      <h1 class="app-header__title">가위바위보</h1>
    </div>
    <button class="theme-toggle" id="theme-btn" aria-label="테마 변경" title="테마 전환">🌙</button>
  </header>

  <!-- ========== Main Game ========== -->
  <main class="game" id="game" data-game-state="idle">

    <!-- 점수판 -->
    <section class="scoreboard" aria-label="점수판">
      <div class="score-item" data-type="win">
        <span class="score-item__count" id="count-win">0</span>
        <span class="score-item__label">승</span>
      </div>
      <div class="score-divider" aria-hidden="true"></div>
      <div class="score-item" data-type="draw">
        <span class="score-item__count" id="count-draw">0</span>
        <span class="score-item__label">무</span>
      </div>
      <div class="score-divider" aria-hidden="true"></div>
      <div class="score-item" data-type="lose">
        <span class="score-item__count" id="count-lose">0</span>
        <span class="score-item__label">패</span>
      </div>
    </section>

    <!-- 배틀 영역 -->
    <div class="battle-area" role="img" aria-label="대전 현황">
      <!-- 플레이어 카드 -->
      <div class="choice-card"
           id="player-card"
           data-owner="player"
           data-state="idle"
           data-choice="none"
           aria-label="나의 선택: 아직 선택하지 않음">
        <div class="choice-card__icon" id="player-icon" aria-hidden="true">❓</div>
        <div class="choice-card__label">나</div>
        <div class="choice-card__name" id="player-name" aria-hidden="true"></div>
      </div>

      <!-- VS 구분자 -->
      <div class="vs-divider" aria-hidden="true">
        <span>VS</span>
      </div>

      <!-- CPU 카드 -->
      <div class="choice-card"
           id="cpu-card"
           data-owner="cpu"
           data-state="idle"
           data-choice="none"
           aria-label="컴퓨터의 선택: 아직 선택하지 않음">
        <div class="choice-card__icon" id="cpu-icon" aria-hidden="true">❓</div>
        <div class="choice-card__label">컴퓨터</div>
        <div class="choice-card__name" id="cpu-name" aria-hidden="true"></div>
      </div>
    </div>

    <!-- 결과 배너 -->
    <div class="result-banner"
         id="result-banner"
         data-result="none"
         role="status"
         aria-live="polite"
         aria-atomic="true">
      <span class="result-banner__icon" id="result-icon" aria-hidden="true"></span>
      <span class="result-banner__text" id="result-text"></span>
    </div>

    <!-- 선택 버튼 패널 -->
    <div class="choice-panel" role="group" aria-label="선택지">
      <button class="choice-btn" data-choice="scissors" aria-label="가위 선택" tabindex="1">
        <span class="choice-btn__icon" aria-hidden="true">✌️</span>
        <span class="choice-btn__name">가위</span>
      </button>
      <button class="choice-btn" data-choice="rock" aria-label="바위 선택" tabindex="2">
        <span class="choice-btn__icon" aria-hidden="true">✊</span>
        <span class="choice-btn__name">바위</span>
      </button>
      <button class="choice-btn" data-choice="paper" aria-label="보 선택" tabindex="3">
        <span class="choice-btn__icon" aria-hidden="true">🖐</span>
        <span class="choice-btn__name">보</span>
      </button>
    </div>

    <!-- 리셋 버튼 + 키보드 힌트 -->
    <button class="reset-btn" id="reset-btn" aria-label="점수 초기화" tabindex="4">
      점수 초기화
    </button>

    <p class="keyboard-hint">
      단축키: <kbd>1</kbd> 가위 &nbsp; <kbd>2</kbd> 바위 &nbsp; <kbd>3</kbd> 보 &nbsp; <kbd>R</kbd> 초기화
    </p>

  </main>

  <!-- ========== JavaScript ========== -->
  <script>
    /* ─── 상수 ─── */
    const CHOICES = {
      scissors: { emoji: '✌️', name: '가위' },
      rock:     { emoji: '✊', name: '바위' },
      paper:    { emoji: '🖐', name: '보'  },
    };

    const RESULTS = {
      win:  { text: 'WIN!',  icon: '🎉', dataResult: 'win'  },
      lose: { text: 'LOSE',  icon: '😤', dataResult: 'lose' },
      draw: { text: 'DRAW',  icon: '🤝', dataResult: 'draw' },
    };

    /* ─── 상태 ─── */
    const score = JSON.parse(localStorage.getItem('rps:score') || '{"win":0,"draw":0,"lose":0}');

    /* ─── DOM 참조 ─── */
    const game        = document.getElementById('game');
    const playerCard  = document.getElementById('player-card');
    const cpuCard     = document.getElementById('cpu-card');
    const playerIcon  = document.getElementById('player-icon');
    const cpuIcon     = document.getElementById('cpu-icon');
    const playerName  = document.getElementById('player-name');
    const cpuName     = document.getElementById('cpu-name');
    const resultBanner = document.getElementById('result-banner');
    const resultIcon  = document.getElementById('result-icon');
    const resultText  = document.getElementById('result-text');
    const countWin    = document.getElementById('count-win');
    const countDraw   = document.getElementById('count-draw');
    const countLose   = document.getElementById('count-lose');
    const themeBtn    = document.getElementById('theme-btn');
    const resetBtn    = document.getElementById('reset-btn');

    /* ─── 초기화 ─── */
    renderScore();

    /* ─── 유틸 ─── */
    function delay(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    function setGameState(state) {
      game.dataset.gameState = state;
    }

    function cpuPick() {
      const keys = Object.keys(CHOICES);
      return keys[Math.floor(Math.random() * keys.length)];
    }

    function judge(player, cpu) {
      if (player === cpu) return 'draw';
      if (
        (player === 'scissors' && cpu === 'paper')  ||
        (player === 'rock'     && cpu === 'scissors') ||
        (player === 'paper'    && cpu === 'rock')
      ) return 'win';
      return 'lose';
    }

    /* ─── 렌더 함수 ─── */
    function renderScore() {
      countWin.textContent  = score.win;
      countDraw.textContent = score.draw;
      countLose.textContent = score.lose;
    }

    function popScore(type) {
      const el = type === 'win' ? countWin : type === 'draw' ? countDraw : countLose;
      el.classList.remove('score-pop');
      void el.offsetWidth; // reflow
      el.classList.add('score-pop');
    }

    function showResultBanner(result) {
      const r = RESULTS[result];
      resultBanner.dataset.result = r.dataResult;
      resultIcon.textContent = r.icon;
      resultText.textContent = r.text;
      resultBanner.classList.remove('visible');
      void resultBanner.offsetWidth;
      resultBanner.classList.add('visible');
    }

    function hideResultBanner() {
      resultBanner.classList.remove('visible');
      resultBanner.dataset.result = 'none';
      resultIcon.textContent = '';
      resultText.textContent = '';
    }

    function resetCards() {
      playerCard.dataset.state  = 'idle';
      playerCard.dataset.choice = 'none';
      cpuCard.dataset.state     = 'idle';
      cpuCard.dataset.choice    = 'none';
      playerIcon.textContent    = '❓';
      cpuIcon.textContent       = '❓';
      playerName.textContent    = '';
      cpuName.textContent       = '';
      playerCard.setAttribute('aria-label', '나의 선택: 아직 선택하지 않음');
      cpuCard.setAttribute('aria-label', '컴퓨터의 선택: 아직 선택하지 않음');
    }

    function showThinkingAnimation() {
      cpuIcon.innerHTML = '<span class="thinking-dots"><span></span><span></span><span></span></span>';
      cpuCard.dataset.state = 'thinking';
    }

    /* ─── 게임 플로우 ─── */
    async function play(playerChoice) {
      // 이미 생각 중이면 무시
      if (game.dataset.gameState === 'thinking') return;

      // 이전 결과 리셋
      hideResultBanner();
      resetCards();

      // 플레이어 선택 표시
      const pChoice = CHOICES[playerChoice];
      playerCard.dataset.choice = playerChoice;
      playerCard.dataset.state  = 'revealed';
      playerIcon.textContent    = pChoice.emoji;
      playerName.textContent    = pChoice.name;
      playerCard.setAttribute('aria-label', `나의 선택: ${pChoice.name}`);

      // thinking 상태
      setGameState('thinking');
      showThinkingAnimation();

      // CPU 생각 딜레이
      await delay(500);

      // CPU 선택 공개
      const cpuChoice = cpuPick();
      const cChoice   = CHOICES[cpuChoice];
      cpuCard.dataset.choice = cpuChoice;
      cpuCard.dataset.state  = 'revealed';
      cpuIcon.textContent    = cChoice.emoji;
      cpuName.textContent    = cChoice.name;
      cpuCard.setAttribute('aria-label', `컴퓨터의 선택: ${cChoice.name}`);
      cpuCard.classList.add('flip-in');
      cpuCard.addEventListener('animationend', () => cpuCard.classList.remove('flip-in'), { once: true });

      // 판정 (약간 딜레이 후)
      await delay(200);
      const result = judge(playerChoice, cpuChoice);
      setGameState(`result-${result}`);
      showResultBanner(result);

      // 점수 업데이트
      score[result]++;
      renderScore();
      popScore(result);
      localStorage.setItem('rps:score', JSON.stringify(score));
    }

    /* ─── 이벤트: 선택 버튼 ─── */
    document.querySelectorAll('.choice-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.disabled) return;
        play(btn.dataset.choice);
      });
    });

    /* ─── 이벤트: 키보드 단축키 ─── */
    document.addEventListener('keydown', e => {
      if (game.dataset.gameState === 'thinking') return;
      if (e.key === '1') play('scissors');
      if (e.key === '2') play('rock');
      if (e.key === '3') play('paper');
      if (e.key === 'r' || e.key === 'R') resetScores();
    });

    /* ─── 이벤트: 점수 초기화 ─── */
    function resetScores() {
      score.win = score.draw = score.lose = 0;
      renderScore();
      localStorage.setItem('rps:score', JSON.stringify(score));
      resetCards();
      hideResultBanner();
      setGameState('idle');
    }
    resetBtn.addEventListener('click', resetScores);

    /* ─── 이벤트: 테마 토글 ─── */
    let isDark = true;
    themeBtn.addEventListener('click', () => {
      isDark = !isDark;
      document.body.dataset.theme = isDark ? 'dark' : 'light';
      themeBtn.textContent = isDark ? '🌙' : '☀️';
      themeBtn.setAttribute('aria-label', isDark ? '라이트 테마로 전환' : '다크 테마로 전환');
    });
  </script>
</body>
</html>
