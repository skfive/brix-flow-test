<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 Design Mockup — BF-658</title>
<style>
/* ===== 디자인 토큰 (§2, §3) ===== */
:root {
  /* 베이스 — 라이트 우선 (기존 다크 기본 모듈과 반전) */
  --color-bg-canvas:      #FAF8EF;
  --color-bg-surface:     #FFFFFF;
  --color-bg-subtle:      #F5F0E8;
  --color-border-default: #DDD5C8;
  --color-text-primary:   #3D3120;
  --color-text-secondary: #8A7D6E;
  --color-accent:         #F5821F;
  --color-accent-on:      #FFFFFF;

  /* 공간 */
  --space-1:4px; --space-2:8px; --space-3:12px;
  --space-4:16px; --space-5:24px; --space-6:32px;
  --radius-sm:4px; --radius-md:8px; --radius-lg:12px;

  /* 폰트 */
  --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-mono: ui-monospace, Menlo, Consolas, monospace;

  /* 보드 전용 */
  --board-bg:      #BBADA0;
  --board-gap:     12px;
  --cell-empty-bg: rgba(238,228,218,0.35);
  --board-radius:  8px;
  --tile-radius:   6px;
  --tile-size:     100px;

  /* 타일 11단계 컬러 시스템 */
  --tile-2:    #EEE4DA;  --tile-2-txt:    #776E65;
  --tile-4:    #EDE0C8;  --tile-4-txt:    #776E65;
  --tile-8:    #F2B179;  --tile-8-txt:    #F9F6F2;
  --tile-16:   #F59563;  --tile-16-txt:   #F9F6F2;
  --tile-32:   #F67C5F;  --tile-32-txt:   #F9F6F2;
  --tile-64:   #F65E3B;  --tile-64-txt:   #F9F6F2;
  --tile-128:  #EDCF72;  --tile-128-txt:  #F9F6F2;
  --tile-256:  #EDCC61;  --tile-256-txt:  #F9F6F2;
  --tile-512:  #EDC850;  --tile-512-txt:  #F9F6F2;
  --tile-1024: #EDC53F;  --tile-1024-txt: #F9F6F2;
  --tile-2048: #EDC22E;  --tile-2048-txt: #F9F6F2;
  --tile-super:#3C3A32;  --tile-super-txt:#F9F6F2;

  /* 오버레이 */
  --overlay-bg:      rgba(250,248,239,0.88);
  --overlay-surface: #FFFFFF;
  --gameover-accent: #C9A888;
  --win-accent:      #EDC22E;

  /* 모션 */
  --slide-dur:  100ms;
  --merge-dur:  200ms;
}

[data-theme="dark"] {
  --color-bg-canvas:      #1A1614;
  --color-bg-surface:     #231E1B;
  --color-bg-subtle:      #2D2620;
  --color-border-default: #3D3028;
  --color-text-primary:   #EDE8E0;
  --color-text-secondary: #A09080;
  --color-accent:         #F5A050;
  --board-bg:        #5A4A40;
  --cell-empty-bg:   rgba(90,74,64,0.40);
  --overlay-bg:      rgba(26,22,20,0.88);
  --overlay-surface: #231E1B;
}

/* ===== 리셋 ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
button{font-family:inherit;cursor:pointer;border:none;}

/* ===== 페이지 ===== */
body {
  font-family: var(--font-sans);
  background: var(--color-bg-canvas);
  color: var(--color-text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 32px 12px 48px;
  transition: background 200ms, color 200ms;
}

/* ===== 게임 카드 (§4.2) ===== */
.game-card {
  background: var(--color-bg-surface);
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  padding: var(--space-5);
  width: 100%;
  max-width: 480px;
  transition: background 200ms, box-shadow 200ms;
}
[data-theme="dark"] .game-card {
  box-shadow: 0 4px 24px rgba(0,0,0,0.40);
}

/* ===== 헤더 (§4.4) ===== */
.game-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: var(--space-3);
}
.game-title {
  font-size: 48px;
  font-weight: 800;
  line-height: 1;
  color: #F65E3B; /* tile-64 — 타일 컬러로 타이틀 연결 */
}
.header-right {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}
.score-group {
  display: flex;
  gap: var(--space-2);
}
.score-box {
  background: var(--board-bg);
  border-radius: 6px;
  padding: 8px 12px;
  min-width: 80px;
  text-align: center;
  position: relative;
  overflow: visible;
}
.score-box__label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(249,246,242,0.75);
  margin-bottom: 2px;
}
.score-box__value {
  display: block;
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  color: #F9F6F2;
}

/* 득점 팝업 (§5.7) */
.score-popup {
  position: absolute;
  top: -4px;
  left: 50%;
  transform: translateX(-50%);
  color: var(--color-accent);
  font-size: 15px;
  font-weight: 700;
  pointer-events: none;
  white-space: nowrap;
  animation: scorePopup 900ms ease-out forwards;
  z-index: 20;
}
@keyframes scorePopup {
  0%   { opacity:1; transform:translateX(-50%) translateY(0); }
  100% { opacity:0; transform:translateX(-50%) translateY(-36px); }
}
@keyframes scoreBump {
  0%   { transform:scale(1.0); }
  40%  { transform:scale(1.25); }
  100% { transform:scale(1.0); }
}
.score-bump { animation: scoreBump 200ms ease-out; }

/* 테마 토글 */
.theme-toggle {
  background: var(--color-bg-subtle);
  border: 1px solid var(--color-border-default);
  border-radius: var(--radius-md);
  width: 36px; height: 36px;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: background 150ms;
  flex-shrink: 0;
}
.theme-toggle:hover { background: var(--color-border-default); }
.theme-toggle:focus-visible { outline:2px solid var(--color-accent); outline-offset:2px; }

/* ===== 게임 메타 (§4.5) ===== */
.game-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-3);
  gap: var(--space-2);
}
.game-desc {
  font-size: 13px;
  color: var(--color-text-secondary);
  line-height: 1.5;
}
.game-desc strong { color: var(--color-text-primary); }
.btn-new-game {
  background: var(--board-bg);
  border-radius: 6px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 700;
  color: #F9F6F2;
  flex-shrink: 0;
  transition: background 150ms;
}
.btn-new-game:hover { background: var(--color-accent); }
.btn-new-game:focus-visible { outline:2px solid var(--color-accent); outline-offset:2px; }

/* ===== 보드 (§4.3, §5.2) ===== */
.board {
  background: var(--board-bg);
  border-radius: var(--board-radius);
  padding: var(--board-gap);
  position: relative;
  user-select: none;
  touch-action: none;
}
.board__cells {
  display: grid;
  grid-template-columns: repeat(4, var(--tile-size));
  grid-template-rows: repeat(4, var(--tile-size));
  gap: var(--board-gap);
}
.cell {
  background: var(--cell-empty-bg);
  border-radius: var(--tile-radius);
}
.board__tiles {
  position: absolute;
  top: var(--board-gap);
  left: var(--board-gap);
  width: calc(4 * var(--tile-size) + 3 * var(--board-gap));
  height: calc(4 * var(--tile-size) + 3 * var(--board-gap));
}

/* ===== 타일 (§5.1) ===== */
.tile {
  position: absolute;
  width: var(--tile-size);
  height: var(--tile-size);
  border-radius: var(--tile-radius);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-sans);
  font-weight: 800;
  line-height: 1;
  transition: transform var(--slide-dur) ease-in-out;
  transform: translate(
    calc(var(--tx,0) * (var(--tile-size) + var(--board-gap))),
    calc(var(--ty,0) * (var(--tile-size) + var(--board-gap)))
  );
}
.tile__num { pointer-events: none; }

/* 신규 타일 등장 (§6.3) */
@keyframes tileSpawn {
  0%   { transform:translate(calc(var(--tx,0)*(var(--tile-size)+var(--board-gap))),calc(var(--ty,0)*(var(--tile-size)+var(--board-gap)))) scale(0); }
  60%  { transform:translate(calc(var(--tx,0)*(var(--tile-size)+var(--board-gap))),calc(var(--ty,0)*(var(--tile-size)+var(--board-gap)))) scale(1.1); }
  100% { transform:translate(calc(var(--tx,0)*(var(--tile-size)+var(--board-gap))),calc(var(--ty,0)*(var(--tile-size)+var(--board-gap)))) scale(1.0); }
}
.tile--new { animation: tileSpawn 200ms ease-out both; }

/* 합치기 팝 (§6.2) */
@keyframes tileMergePop {
  0%   { transform:translate(calc(var(--tx,0)*(var(--tile-size)+var(--board-gap))),calc(var(--ty,0)*(var(--tile-size)+var(--board-gap)))) scale(1.0); }
  40%  { transform:translate(calc(var(--tx,0)*(var(--tile-size)+var(--board-gap))),calc(var(--ty,0)*(var(--tile-size)+var(--board-gap)))) scale(1.18); }
  100% { transform:translate(calc(var(--tx,0)*(var(--tile-size)+var(--board-gap))),calc(var(--ty,0)*(var(--tile-size)+var(--board-gap)))) scale(1.0); }
}
.tile--merged { animation: tileMergePop var(--merge-dur) ease-out both; z-index:2; }

/* 타일 컬러 — attribute selector (§5.1) */
.tile[data-value="2"]    { background:var(--tile-2);    color:var(--tile-2-txt);    }
.tile[data-value="4"]    { background:var(--tile-4);    color:var(--tile-4-txt);    }
.tile[data-value="8"]    { background:var(--tile-8);    color:var(--tile-8-txt);    }
.tile[data-value="16"]   { background:var(--tile-16);   color:var(--tile-16-txt);   }
.tile[data-value="32"]   { background:var(--tile-32);   color:var(--tile-32-txt);   }
.tile[data-value="64"]   { background:var(--tile-64);   color:var(--tile-64-txt);   }
.tile[data-value="128"]  { background:var(--tile-128);  color:var(--tile-128-txt);  }
.tile[data-value="256"]  { background:var(--tile-256);  color:var(--tile-256-txt);  }
.tile[data-value="512"]  { background:var(--tile-512);  color:var(--tile-512-txt);  }
.tile[data-value="1024"] { background:var(--tile-1024); color:var(--tile-1024-txt); }
.tile[data-value="2048"] {
  background:var(--tile-2048); color:var(--tile-2048-txt);
  box-shadow:0 0 20px rgba(237,194,46,0.60), 0 0 40px rgba(237,194,46,0.30);
}
.tile[data-value="super"]{ background:var(--tile-super); color:var(--tile-super-txt); }

/* 타일 숫자 크기 (§3.2) */
.tile[data-value="2"]   .tile__num,
.tile[data-value="4"]   .tile__num,
.tile[data-value="8"]   .tile__num,
.tile[data-value="16"]  .tile__num,
.tile[data-value="32"]  .tile__num,
.tile[data-value="64"]  .tile__num   { font-size:40px; }
.tile[data-value="128"] .tile__num,
.tile[data-value="256"] .tile__num,
.tile[data-value="512"] .tile__num   { font-size:32px; }
.tile[data-value="1024"].tile__num,
.tile[data-value="2048"].tile__num   { font-size:26px; }
.tile[data-value="super"].tile__num  { font-size:20px; }

/* ===== 오버레이 (§5.5, §5.6) ===== */
.overlay {
  position:absolute; inset:0;
  border-radius:var(--board-radius);
  background:var(--overlay-bg);
  display:flex; align-items:center; justify-content:center;
  z-index:10;
  opacity:0; pointer-events:none;
  transition:opacity 300ms;
}
.overlay.active { opacity:1; pointer-events:auto; }
.overlay__card {
  background:var(--overlay-surface);
  border-radius:12px; padding:32px;
  text-align:center; width:260px;
  box-shadow:0 8px 32px rgba(0,0,0,0.15);
}
[data-theme="dark"] .overlay__card { box-shadow:0 8px 32px rgba(0,0,0,0.50); }
.overlay__icon { font-size:36px; margin-bottom:var(--space-2); }
.overlay__title { font-size:32px; font-weight:800; margin-bottom:var(--space-3); }
.overlay__title--gameover { color:var(--gameover-accent); }
.overlay__title--win      { color:var(--win-accent); }
.overlay__sub { font-size:15px; color:var(--color-text-secondary); margin-bottom:var(--space-2); }
.overlay__score-label { font-size:13px; color:var(--color-text-secondary); margin-bottom:var(--space-1); }
.overlay__score-value {
  font-family:var(--font-mono); font-size:36px; font-weight:800;
  color:var(--color-text-primary); margin-bottom:var(--space-5);
}
.overlay__actions { display:flex; gap:var(--space-2); justify-content:center; }
.btn-primary {
  background:var(--color-accent); color:var(--color-accent-on);
  border-radius:8px; padding:10px 20px;
  font-size:14px; font-weight:700;
  transition:opacity 150ms;
}
.btn-primary:hover { opacity:0.85; }
.btn-primary:focus-visible { outline:2px solid var(--color-accent); outline-offset:2px; }
.btn-ghost {
  background:transparent; color:var(--color-text-secondary);
  border:1px solid var(--color-border-default);
  border-radius:8px; padding:10px 20px;
  font-size:14px; font-weight:700;
  transition:border-color 150ms, color 150ms;
}
.btn-ghost:hover { border-color:var(--color-text-secondary); color:var(--color-text-primary); }
.btn-ghost:focus-visible { outline:2px solid var(--color-accent); outline-offset:2px; }

/* ===== 타일 쇼케이스 ===== */
.showcase {
  margin-top:32px;
  max-width:480px; width:100%;
}
.showcase__title {
  font-size:11px; font-weight:600; letter-spacing:1px;
  text-transform:uppercase; color:var(--color-text-secondary);
  text-align:center; margin-bottom:var(--space-3);
}
.showcase__grid {
  display:grid; grid-template-columns:repeat(6,1fr); gap:8px;
}
.sc-tile {
  border-radius:6px; height:52px;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-family:var(--font-sans);
}

/* ===== 반응형 (§4.6) ===== */
@media (max-width:519px) {
  :root { --tile-size:72px; --board-gap:10px; }
  .game-title { font-size:36px; }
  .score-box { min-width:60px; padding:6px 8px; }
  .score-box__value { font-size:16px; }
  .tile[data-value="2"]   .tile__num,
  .tile[data-value="4"]   .tile__num,
  .tile[data-value="8"]   .tile__num,
  .tile[data-value="16"]  .tile__num,
  .tile[data-value="32"]  .tile__num,
  .tile[data-value="64"]  .tile__num   { font-size:28px; }
  .tile[data-value="128"] .tile__num,
  .tile[data-value="256"] .tile__num,
  .tile[data-value="512"] .tile__num   { font-size:22px; }
  .tile[data-value="1024"].tile__num,
  .tile[data-value="2048"].tile__num   { font-size:18px; }
  .showcase__grid { grid-template-columns:repeat(4,1fr); }
}
</style>
</head>
<body data-theme="light">

<!-- 게임 카드 -->
<div class="game-card">

  <!-- 헤더 -->
  <header class="game-header">
    <h1 class="game-title">2048</h1>
    <div class="header-right">
      <div class="score-group">
        <div class="score-box" id="score-box">
          <span class="score-box__label">SCORE</span>
          <span class="score-box__value" id="score-val">0</span>
        </div>
        <div class="score-box" id="best-box">
          <span class="score-box__label">BEST</span>
          <span class="score-box__value" id="best-val">0</span>
        </div>
      </div>
      <button class="theme-toggle" id="theme-btn" aria-label="테마 변경">🌙</button>
    </div>
  </header>

  <!-- 메타 -->
  <div class="game-meta">
    <p class="game-desc">타일을 합쳐서 <strong>2048</strong>을 만드세요!</p>
    <button class="btn-new-game" id="btn-new">새 게임</button>
  </div>

  <!-- 보드 -->
  <div class="board" id="board" role="grid" aria-label="2048 게임 보드">
    <div class="board__cells" id="cells" aria-hidden="true"></div>
    <div class="board__tiles" id="tiles"></div>

    <!-- 게임오버 오버레이 -->
    <div class="overlay" id="ov-gameover" role="dialog" aria-hidden="true">
      <div class="overlay__card">
        <p class="overlay__title overlay__title--gameover">Game Over</p>
        <p class="overlay__score-label">최종 점수</p>
        <p class="overlay__score-value" id="final-score">0</p>
        <button class="btn-primary" id="btn-retry">다시 하기</button>
      </div>
    </div>

    <!-- WIN 오버레이 -->
    <div class="overlay" id="ov-win" role="dialog" aria-hidden="true">
      <div class="overlay__card">
        <p class="overlay__icon" aria-hidden="true">✨</p>
        <p class="overlay__title overlay__title--win">You Win!</p>
        <p class="overlay__sub">2048 달성!</p>
        <div class="overlay__actions">
          <button class="btn-ghost" id="btn-continue">계속 하기</button>
          <button class="btn-primary" id="btn-new-win">새 게임</button>
        </div>
      </div>
    </div>
  </div><!-- .board -->

</div><!-- .game-card -->

<!-- 타일 컬러 쇼케이스 -->
<div class="showcase">
  <p class="showcase__title">타일 컬러 시스템 — 크림 → 코랄/불꽃 → 황금/전설</p>
  <div class="showcase__grid">
    <div class="sc-tile" style="background:#EEE4DA;color:#776E65;font-size:16px">2</div>
    <div class="sc-tile" style="background:#EDE0C8;color:#776E65;font-size:16px">4</div>
    <div class="sc-tile" style="background:#F2B179;color:#F9F6F2;font-size:16px">8</div>
    <div class="sc-tile" style="background:#F59563;color:#F9F6F2;font-size:14px">16</div>
    <div class="sc-tile" style="background:#F67C5F;color:#F9F6F2;font-size:14px">32</div>
    <div class="sc-tile" style="background:#F65E3B;color:#F9F6F2;font-size:14px">64</div>
    <div class="sc-tile" style="background:#EDCF72;color:#F9F6F2;font-size:12px">128</div>
    <div class="sc-tile" style="background:#EDCC61;color:#F9F6F2;font-size:12px">256</div>
    <div class="sc-tile" style="background:#EDC850;color:#F9F6F2;font-size:12px">512</div>
    <div class="sc-tile" style="background:#EDC53F;color:#F9F6F2;font-size:11px">1024</div>
    <div class="sc-tile" style="background:#EDC22E;color:#F9F6F2;font-size:11px;box-shadow:0 0 12px rgba(237,194,46,0.5)">2048</div>
    <div class="sc-tile" style="background:#3C3A32;color:#F9F6F2;font-size:11px">4096+</div>
  </div>
</div>

<script>
// ===== 2048 Game Mockup — BF-658 =====
// 방향키 / WASD 로 실제 플레이 가능, 터치 스와이프 지원

// --- 상태 ---
let score = 0, bestScore = 0;
let gState = 'playing'; // 'playing' | 'gameover' | 'win' | 'won-cont'
let winShown = false, busy = false;
let nextId = 0;

// board[r][c] = tile id (1+) 또는 0
const board = Array.from({length:4}, () => new Array(4).fill(0));
// tiles: id -> {id, value, row, col}
const tiles = {};
// DOM elements per tile id
const els = {};

// --- DOM ---
const tilesEl   = document.getElementById('tiles');
const scoreValEl= document.getElementById('score-val');
const bestValEl = document.getElementById('best-val');
const scoreBox  = document.getElementById('score-box');
const finalScEl = document.getElementById('final-score');
const ovGO      = document.getElementById('ov-gameover');
const ovWin     = document.getElementById('ov-win');

// --- 초기화 ---
function init() {
  // 빈 셀 16개
  const cellsEl = document.getElementById('cells');
  cellsEl.innerHTML = '';
  for (let i = 0; i < 16; i++) {
    const c = document.createElement('div'); c.className='cell'; cellsEl.appendChild(c);
  }
  // localStorage
  bestScore = +localStorage.getItem('g2048:best') || 0;
  bestValEl.textContent = bestScore;
  const th = localStorage.getItem('g2048:theme') || 'light';
  document.body.dataset.theme = th;
  updateThemeIcon();
  newGame();
}

function newGame() {
  // 초기화
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) board[r][c]=0;
  for (const id in tiles) delete tiles[id];
  for (const id in els) { els[id].remove(); delete els[id]; }
  nextId = 0; score = 0; gState = 'playing'; winShown = false;
  scoreValEl.textContent = '0';
  hideOverlays();
  spawn(); spawn();
}

// --- 타일 생성 ---
function spawn() {
  const empty = [];
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) if (!board[r][c]) empty.push([r,c]);
  if (!empty.length) return null;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  const v = Math.random()<0.9?2:4;
  const id = ++nextId;
  tiles[id] = {id, value:v, row:r, col:c};
  board[r][c] = id;
  renderTile(id, true);
  return id;
}

function renderTile(id, isNew) {
  const t = tiles[id];
  const el = document.createElement('div');
  el.className = 'tile' + (isNew ? ' tile--new' : '');
  setTileValue(el, t.value);
  el.style.setProperty('--tx', t.col);
  el.style.setProperty('--ty', t.row);
  tilesEl.appendChild(el);
  els[id] = el;
}

function setTileValue(el, v) {
  el.dataset.value = v <= 2048 ? String(v) : 'super';
  el.innerHTML = `<span class="tile__num">${v}</span>`;
}

// --- 이동 ---
// 슬라이스(한 행/열)를 왼쪽 방향으로 슬라이드
// slice: [[r,c], ...] — 목적지 방향이 앞
function slideSlice(slice) {
  // 기존 타일 ID 수집
  const ids = slice.map(([r,c]) => board[r][c]).filter(Boolean);
  // 슬라이스 초기화
  for (const [r,c] of slice) board[r][c]=0;

  const result = [];   // 남는 tile id들 (순서대로)
  const merges  = [];  // {survivor, removed, destR, destC} — 합치기 정보
  let canMerge = true;
  let i=0;

  while (i < ids.length) {
    const id = ids[i];
    if (result.length && canMerge && tiles[result.at(-1)].value === tiles[id].value) {
      const survivorId = result.at(-1);
      const pos = slice[result.length-1];
      merges.push({survivor:survivorId, removed:id, destR:pos[0], destC:pos[1]});
      tiles[survivorId].value *= 2;
      canMerge = false;
    } else {
      result.push(id);
      canMerge = true;
    }
    i++;
  }

  // 결과 타일 배치
  for (let j=0; j<result.length; j++) {
    const id = result[j];
    const [r,c] = slice[j];
    tiles[id].row = r; tiles[id].col = c;
    board[r][c] = id;
  }
  // 제거될 타일 최종 위치 (merge 목적지로 슬라이드)
  for (const m of merges) {
    tiles[m.removed].row = m.destR;
    tiles[m.removed].col = m.destC;
  }

  return {result, merges};
}

function getSlices(dir) {
  const s=[];
  for (let i=0;i<4;i++) {
    if (dir==='left')  s.push([[i,0],[i,1],[i,2],[i,3]]);
    if (dir==='right') s.push([[i,3],[i,2],[i,1],[i,0]]);
    if (dir==='up')    s.push([[0,i],[1,i],[2,i],[3,i]]);
    if (dir==='down')  s.push([[3,i],[2,i],[1,i],[0,i]]);
  }
  return s;
}

function move(dir) {
  if (busy || (gState!=='playing' && gState!=='won-cont')) return;

  // 이동 전 위치 저장
  const prevPos = {};
  for (const id in tiles) prevPos[id]={row:tiles[id].row, col:tiles[id].col};

  let totalGained=0, anyMoved=false;
  const allMerges=[];

  for (const slice of getSlices(dir)) {
    const {result, merges} = slideSlice(slice);
    for (const m of merges) { totalGained += tiles[m.survivor].value; allMerges.push(m); }
  }

  // 변화 여부 확인
  for (const id in tiles) {
    if (prevPos[id] && (tiles[id].row!==prevPos[id].row || tiles[id].col!==prevPos[id].col)) {
      anyMoved=true; break;
    }
  }
  if (!anyMoved && !allMerges.length) return;

  busy = true;

  // Phase 1: 이전 위치로 (transition 없이)
  for (const id in tiles) {
    const el = els[id];
    if (!el) continue;
    el.style.transition='none';
    const p = prevPos[id] || {row:tiles[id].row, col:tiles[id].col};
    el.style.setProperty('--tx', p.col);
    el.style.setProperty('--ty', p.row);
  }
  // removed 타일도 이전 위치로
  for (const m of allMerges) {
    const el = els[m.removed];
    if (!el) continue;
    el.style.transition='none';
    const p = prevPos[m.removed];
    if (p) { el.style.setProperty('--tx', p.col); el.style.setProperty('--ty', p.row); }
  }

  // reflow
  tilesEl.getBoundingClientRect();

  // Phase 2: 새 위치로 애니메이션
  for (const id in tiles) {
    const el = els[id]; if (!el) continue;
    el.style.transition='';
    el.style.setProperty('--tx', tiles[id].col);
    el.style.setProperty('--ty', tiles[id].row);
  }
  for (const m of allMerges) {
    const el = els[m.removed]; if (!el) continue;
    el.style.transition='';
    el.style.setProperty('--tx', m.destC);
    el.style.setProperty('--ty', m.destR);
    el.style.zIndex='0';
  }

  // slide 완료 후
  setTimeout(() => {
    // 제거 타일 DOM 삭제
    for (const m of allMerges) {
      if (els[m.removed]) { els[m.removed].remove(); delete els[m.removed]; }
      delete tiles[m.removed];
    }
    // 합치기 결과 타일 값 업데이트 + pop 애니
    for (const m of allMerges) {
      const el = els[m.survivor]; if (!el) continue;
      setTileValue(el, tiles[m.survivor].value);
      el.classList.remove('tile--merged'); void el.offsetWidth;
      el.classList.add('tile--merged');
      setTimeout(()=>el.classList.remove('tile--merged'), 300);
    }
    // 점수
    if (totalGained > 0) {
      score += totalGained;
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('g2048:best', bestScore);
        bestValEl.textContent = bestScore;
      }
      scoreValEl.textContent = score;
      showScorePopup(totalGained);
      const sv = scoreBox.querySelector('.score-box__value');
      sv.classList.remove('score-bump'); void sv.offsetWidth; sv.classList.add('score-bump');
    }
    // 새 타일 스폰
    spawn();
    // 게임 상태 체크
    if (!winShown && hasValue(2048)) {
      winShown=true; gState='win';
      setTimeout(()=>showOverlay(ovWin), 350);
    } else if (isGameOver()) {
      gState='gameover';
      document.getElementById('final-score').textContent = score;
      setTimeout(()=>showOverlay(ovGO), 350);
    }
    busy=false;
  }, 130);
}

function hasValue(v) {
  for(const id in tiles) if(tiles[id].value===v) return true;
  return false;
}
function isGameOver() {
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) {
    if(!board[r][c]) return false;
    if(c<3 && tiles[board[r][c]]?.value===tiles[board[r][c+1]]?.value) return false;
    if(r<3 && tiles[board[r][c]]?.value===tiles[board[r+1][c]]?.value) return false;
  }
  return true;
}

// --- 점수 팝업 ---
function showScorePopup(v) {
  const p = document.createElement('span');
  p.className='score-popup'; p.textContent=`+${v}`;
  scoreBox.appendChild(p);
  setTimeout(()=>p.remove(), 950);
}

// --- 오버레이 ---
function showOverlay(el) {
  el.classList.add('active'); el.removeAttribute('aria-hidden');
  const btn=el.querySelector('button'); if(btn) btn.focus();
}
function hideOverlays() {
  [ovGO,ovWin].forEach(o=>{ o.classList.remove('active'); o.setAttribute('aria-hidden','true'); });
}

// --- 테마 ---
function updateThemeIcon() {
  document.getElementById('theme-btn').textContent =
    document.body.dataset.theme==='dark' ? '☀️' : '🌙';
}

// --- 이벤트 ---
document.getElementById('theme-btn').addEventListener('click', ()=>{
  const isDark = document.body.dataset.theme==='dark';
  document.body.dataset.theme = isDark?'light':'dark';
  localStorage.setItem('g2048:theme', document.body.dataset.theme);
  updateThemeIcon();
});
document.getElementById('btn-new').addEventListener('click', newGame);
document.getElementById('btn-retry').addEventListener('click', newGame);
document.getElementById('btn-new-win').addEventListener('click', newGame);
document.getElementById('btn-continue').addEventListener('click', ()=>{
  hideOverlays(); gState='won-cont';
});

// 키보드
const dirMap = {
  ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down',
  a:'left', d:'right', w:'up', s:'down',
  A:'left', D:'right', W:'up', S:'down',
};
document.addEventListener('keydown', e=>{
  if (dirMap[e.key]) { e.preventDefault(); move(dirMap[e.key]); }
  else if (e.key==='r'||e.key==='R') newGame();
});

// 터치 스와이프
let tx0=0, ty0=0;
const boardEl = document.getElementById('board');
boardEl.addEventListener('touchstart', e=>{ tx0=e.touches[0].clientX; ty0=e.touches[0].clientY; },{passive:true});
boardEl.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx0, dy=e.changedTouches[0].clientY-ty0;
  if(Math.max(Math.abs(dx),Math.abs(dy))<20) return;
  move(Math.abs(dx)>Math.abs(dy) ? (dx>0?'right':'left') : (dy>0?'down':'up'));
},{passive:true});

// --- 시작 ---
init();
</script>
