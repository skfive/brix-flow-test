<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>타이머 SPA — 시각 mockup (BF-492)</title>

  <!-- FOUC 방지 IIFE (AC-6 · §5.2) -->
  <script>
  (function() {
    var t = localStorage.getItem('bf-theme');
    if (!t) { t = 'dark'; }
    document.documentElement.setAttribute('data-theme', t);
  })();
  </script>

  <style>
    /* ═══════════════════════════════════════════════════
       §2 디자인 토큰 — Dark Default (AC-6, AC-8)
    ═══════════════════════════════════════════════════ */
    :root {
      /* 배경 */
      --color-bg-canvas:  #0f1115;
      --color-bg-surface: #171a21;
      --color-bg-subtle:  #1e222b;

      /* 테두리 */
      --color-border-default: #262b36;
      --color-border-strong:  #3a4150;

      /* 텍스트 */
      --color-text-primary:   #e8e8e4;
      --color-text-secondary: #9a9a93;
      --color-text-muted:     #6b6b66;

      /* 액션 */
      --color-accent:       #5b82f0;
      --color-accent-hover: #7596f3;
      --color-danger:       #e55858;
      --color-danger-hover: #ec7676;
      --color-focus-ring:   rgba(91, 130, 240, 0.55);

      /* 타이머 상태 */
      --color-timer-running: #3aae7a;
      --color-timer-paused:  #d4a23a;

      /* 종료 알림 (AC-4) */
      --color-timer-ended-bg:     #3a1f22;
      --color-timer-ended-border: #7a3a3f;
      --color-timer-ended-text:   #fcb7b7;
      --color-timer-ended-flash:  #ff6b6b;

      /* 그림자 */
      --shadow-card: 0 4px 16px rgba(0, 0, 0, 0.32);

      /* 공간 토큰 (AC-8) */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 24px;
      --space-6: 32px;
      --space-7: 48px;

      /* 반경 */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;

      /* 모션 */
      --motion-fast: 120ms;
      --motion-mid:  220ms;
      --ease-out:    cubic-bezier(0.2, 0, 0, 1);

      /* 폰트 스택 (system font only — vanilla-static, AC-6) */
      --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI",
                   "Pretendard", "Apple SD Gothic Neo", sans-serif;
      --font-mono: ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
    }

    /* ═══════════════════════════════════════════════════
       §2.2 Light 오버라이드 (AC-7)
    ═══════════════════════════════════════════════════ */
    [data-theme="light"] {
      --color-bg-canvas:  #fafaf9;
      --color-bg-surface: #ffffff;
      --color-bg-subtle:  #f1f1ef;
      --color-border-default: #e5e5e2;
      --color-border-strong:  #d0d0cc;
      --color-text-primary:   #1a1a19;
      --color-text-secondary: #6b6b66;
      --color-text-muted:     #9a9a93;
      --color-accent:         #3563e9;
      --color-accent-hover:   #2a4fc0;
      --color-danger:         #d14343;
      --color-danger-hover:   #a83333;
      --color-focus-ring:     rgba(53, 99, 233, 0.45);
      --color-timer-running:  #1f8a5c;
      --color-timer-paused:   #b7791f;
      --color-timer-ended-bg:     #fff1f1;
      --color-timer-ended-border: #f4b5b5;
      --color-timer-ended-text:   #9a2a2a;
      --color-timer-ended-flash:  #e53e3e;
      --shadow-card: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    /* ═══════════════════════════════════════════════════
       기본 리셋
    ═══════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { color-scheme: dark; }
    [data-theme="light"] { color-scheme: light; }

    body {
      font-family: var(--font-sans);
      background: var(--color-bg-canvas);
      color: var(--color-text-primary);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      transition: background var(--motion-mid), color var(--motion-mid);
    }

    /* ═══════════════════════════════════════════════════
       Topbar — §4.2 [AC-5, AC-7]
    ═══════════════════════════════════════════════════ */
    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 var(--space-5);
      background: var(--color-bg-surface);
      border-bottom: 1px solid var(--color-border-default);
      flex: 0 0 auto;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar__title {
      font-size: 20px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--color-text-primary);
      flex: 1;
    }
    #theme-toggle {
      height: 36px;
      padding: 0 var(--space-3);
      background: transparent;
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-md);
      color: var(--color-text-secondary);
      font-size: 16px;
      cursor: pointer;
      transition: background var(--motion-fast), color var(--motion-fast);
    }
    #theme-toggle:hover {
      background: var(--color-bg-subtle);
      color: var(--color-text-primary);
    }

    /* ═══════════════════════════════════════════════════
       main 영역
    ═══════════════════════════════════════════════════ */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: var(--space-7) var(--space-5);
    }

    /* ═══════════════════════════════════════════════════
       Mockup 섹션 구분 레이블 (시각화 전용)
    ═══════════════════════════════════════════════════ */
    .mockup-section-label {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-sm);
      padding: 2px 8px;
      margin-bottom: var(--space-4);
    }

    /* ═══════════════════════════════════════════════════
       Timer Card — §4.1
    ═══════════════════════════════════════════════════ */
    .timer-card {
      width: 100%;
      max-width: 720px;
      background: var(--color-bg-surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: var(--space-7) var(--space-6);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-6);
    }

    /* ═══════════════════════════════════════════════════
       Ended Banner — §4.6 [AC-4]
    ═══════════════════════════════════════════════════ */
    .ended-banner {
      width: 100%;
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-5);
      background: var(--color-timer-ended-bg);
      border: 1px solid var(--color-timer-ended-border);
      border-radius: var(--radius-md);
      color: var(--color-timer-ended-text);
      font: 500 14px/1.4 var(--font-sans);
    }
    .ended-banner[hidden] { display: none; }
    .ended-banner__icon { font-size: 18px; }
    .ended-banner__text { flex: 1; }
    .ended-banner__close {
      margin-left: auto;
      background: none;
      border: none;
      color: inherit;
      font-size: 18px;
      cursor: pointer;
      opacity: 0.7;
      line-height: 1;
      padding: 0 var(--space-1);
    }
    .ended-banner__close:hover { opacity: 1; }

    /* banner 슬라이드인 (ended 상태) */
    .banner-slide-in {
      animation: banner-in 300ms var(--ease-out) both;
    }
    @keyframes banner-in {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════════════════════════
       카운트다운 Display — §4.3 [AC-2]
    ═══════════════════════════════════════════════════ */
    .display {
      font-size: 128px;
      font-weight: 300;
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      letter-spacing: -0.02em;
      user-select: none;
      color: var(--color-text-muted);
      transition: color var(--motion-fast);
      display: flex;
      align-items: baseline;
      gap: 0;
    }
    .display__colon {
      display: inline-block;
      padding: 0 4px;
    }

    /* 상태별 색상 */
    .display--value   { color: var(--color-text-primary); }
    .display--running { color: var(--color-text-primary); }
    .display--paused  { color: var(--color-timer-paused); }
    .display--ended   {
      color: var(--color-timer-ended-text);
      font-weight: 400;
      animation:
        timer-flash 300ms ease-in-out 2,
        timer-pulse 500ms ease-in-out 2 600ms;
    }

    /* flash + pulse keyframes (AC-4) */
    @keyframes timer-flash {
      0%   { color: var(--color-timer-ended-flash); }
      50%  { color: var(--color-timer-ended-text);  }
      100% { color: var(--color-timer-ended-flash); }
    }
    @keyframes timer-pulse {
      0%, 100% { opacity: 1;    }
      50%       { opacity: 0.55; }
    }

    /* 접근성: 모션 감소 (AC-8 a11y) */
    @media (prefers-reduced-motion: reduce) {
      .display--ended   { animation: none; }
      .banner-slide-in  { animation: none; }
    }

    /* 반응형 §7 */
    @media (max-width: 959px) {
      .display { font-size: 96px; }
    }
    @media (max-width: 639px) {
      .display { font-size: 72px; }
      .timer-card { padding: var(--space-5) var(--space-4); }
    }
    @media (max-width: 359px) {
      .display { font-size: 64px; }
    }

    /* ═══════════════════════════════════════════════════
       분/초 입력 폼 — §4.4 [AC-1, AC-9]
    ═══════════════════════════════════════════════════ */
    .input-pair {
      display: flex;
      align-items: flex-end;
      gap: var(--space-4);
    }
    .input-pair__field {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
    }
    .input-pair input[type="number"] {
      width: 72px;
      height: 56px;
      font: 600 28px/1 var(--font-mono);
      text-align: center;
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-md);
      background: var(--color-bg-canvas);
      color: var(--color-text-primary);
      appearance: none;
      -moz-appearance: textfield;
      transition: border-color var(--motion-fast);
    }
    .input-pair input[type="number"]::-webkit-outer-spin-button,
    .input-pair input[type="number"]::-webkit-inner-spin-button { display: none; }
    .input-pair input[type="number"]:focus {
      outline: 2px solid var(--color-focus-ring);
      outline-offset: 2px;
      border-color: var(--color-accent);
    }
    .input-pair__label {
      font-size: 12px;
      color: var(--color-text-secondary);
      line-height: 1.4;
    }
    .input-pair__sep {
      font: 300 28px/1 var(--font-mono);
      color: var(--color-text-muted);
      padding-bottom: var(--space-5); /* label 높이 보정 */
    }

    /* ═══════════════════════════════════════════════════
       hint 텍스트
    ═══════════════════════════════════════════════════ */
    .hint {
      font-size: 12px;
      color: var(--color-text-muted);
      line-height: 1.4;
    }

    /* ═══════════════════════════════════════════════════
       컨트롤 버튼 — §4.5 [AC-3]
    ═══════════════════════════════════════════════════ */
    .controls {
      display: flex;
      gap: var(--space-4);
      justify-content: center;
      width: 100%;
    }

    /* primary 버튼 */
    .btn--primary-lg {
      height: 56px;
      min-width: 160px;
      padding: 0 var(--space-6);
      background: var(--color-accent);
      color: #fff;
      font: 600 16px/1 var(--font-sans);
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      transition: background var(--motion-fast), transform 100ms;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
    }
    .btn--primary-lg:hover:not(:disabled) { background: var(--color-accent-hover); }
    .btn--primary-lg:active:not(:disabled) { transform: scale(0.97); }
    .btn--primary-lg:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ghost(reset) 버튼 */
    .btn--ghost-lg {
      height: 56px;
      padding: 0 var(--space-5);
      background: transparent;
      color: var(--color-text-secondary);
      font: 500 14px/1 var(--font-sans);
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: color var(--motion-fast), border-color var(--motion-fast),
                  background var(--motion-fast);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .btn--ghost-lg:hover:not(:disabled) {
      color: var(--color-danger);
      border-color: var(--color-danger);
      background: var(--color-bg-subtle);
    }
    .btn--ghost-lg:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ═══════════════════════════════════════════════════
       keyboard hint
    ═══════════════════════════════════════════════════ */
    .kbd-hint {
      font-size: 12px;
      color: var(--color-text-muted);
      line-height: 1.4;
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
      justify-content: center;
    }
    .kbd-hint kbd {
      display: inline-block;
      padding: 1px 6px;
      background: var(--color-bg-subtle);
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-sm);
      font: 11px/1.6 var(--font-mono);
      color: var(--color-text-secondary);
    }

    /* ═══════════════════════════════════════════════════
       Mockup 섹션 구분선 (시각화 전용)
    ═══════════════════════════════════════════════════ */
    .mockup-divider {
      width: 100%;
      max-width: 720px;
      text-align: center;
      margin: var(--space-7) auto var(--space-5);
      position: relative;
    }
    .mockup-divider::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0; right: 0;
      height: 1px;
      background: var(--color-border-default);
    }
    .mockup-divider span {
      position: relative;
      z-index: 1;
      background: var(--color-bg-canvas);
      padding: 0 var(--space-4);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    /* ═══════════════════════════════════════════════════
       running 상태 indicator dot (§4.3 보조)
    ═══════════════════════════════════════════════════ */
    .state-indicator {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: 12px;
      color: var(--color-text-muted);
    }
    .state-indicator__dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--color-text-muted);
    }
    .state-indicator--running .state-indicator__dot {
      background: var(--color-timer-running);
      animation: blink 1s ease-in-out infinite;
    }
    .state-indicator--running { color: var(--color-timer-running); }
    .state-indicator--paused .state-indicator__dot {
      background: var(--color-timer-paused);
    }
    .state-indicator--paused { color: var(--color-timer-paused); }
    .state-indicator--ended .state-indicator__dot {
      background: var(--color-timer-ended-text);
    }
    .state-indicator--ended { color: var(--color-timer-ended-text); }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>

  <!-- ─────────────────────────────────────────────────
       Topbar (§4.2) [AC-5, AC-7]
  ───────────────────────────────────────────────── -->
  <header class="topbar">
    <h1 class="topbar__title">타이머</h1>
    <button id="theme-toggle"
            aria-label="라이트 테마로 전환"
            title="테마 전환 (bf-theme localStorage)">
      ☀️
    </button>
  </header>

  <main>
    <div style="width:100%; max-width:720px; display:flex; flex-direction:column; gap:0;">

      <!-- ═══════════════════════════════════════════
           STATE 1: IDLE (입력 대기)
           분/초 입력 + 시작 버튼 비활성 → 값 입력 후 활성
      ═══════════════════════════════════════════ -->
      <div class="mockup-section-label">State 1 — IDLE (입력 대기)</div>

      <section class="timer-card" aria-label="타이머 — Idle 상태">
        <!-- 종료 배너: idle 에서는 숨김 -->
        <div class="ended-banner" hidden role="alert" aria-live="assertive">
          <span class="ended-banner__icon" aria-hidden="true">⏰</span>
          <span class="ended-banner__text">시간이 다 됐어요!</span>
          <button class="ended-banner__close" aria-label="알림 닫기">×</button>
        </div>

        <!-- display (§4.3) [AC-2]: idle 0:00 → muted -->
        <div class="display" role="timer" aria-live="off" aria-label="남은 시간">
          <span id="disp-m-idle">0</span>
          <span class="display__colon" aria-hidden="true">:</span>
          <span id="disp-s-idle">00</span>
        </div>

        <!-- 분/초 입력 (§4.4) [AC-1] -->
        <div class="input-pair" id="input-pair">
          <div class="input-pair__field">
            <input type="number" id="input-m" min="0" max="99" value="5"
                   inputmode="numeric" pattern="\d*" aria-label="분" />
            <span class="input-pair__label">분</span>
          </div>
          <span class="input-pair__sep" aria-hidden="true">:</span>
          <div class="input-pair__field">
            <input type="number" id="input-s" min="0" max="59" value="0"
                   inputmode="numeric" pattern="\d*" aria-label="초" />
            <span class="input-pair__label">초</span>
          </div>
        </div>

        <p class="hint">분과 초를 입력하세요</p>

        <!-- 컨트롤 (§4.5) [AC-3]: 값 없으면 시작 비활성 -->
        <div class="controls">
          <button class="btn--primary-lg" id="btn-primary-idle" aria-label="타이머 시작">
            ▶ 시작
          </button>
          <button class="btn--ghost-lg" disabled aria-label="타이머 리셋">
            ⟲ 리셋
          </button>
        </div>

        <p class="kbd-hint">
          <kbd>Space</kbd> 시작/정지
          &nbsp;·&nbsp;
          <kbd>Esc</kbd> 리셋
        </p>
      </section>

      <!-- ═══════════════════════════════════════════
           STATE 2: RUNNING (카운트다운 진행 중)
      ═══════════════════════════════════════════ -->
      <div class="mockup-divider"><span>State 2 — RUNNING (진행 중)</span></div>

      <section class="timer-card" aria-label="타이머 — Running 상태">
        <div class="ended-banner" hidden role="alert" aria-live="assertive">
          <span class="ended-banner__icon" aria-hidden="true">⏰</span>
          <span class="ended-banner__text">시간이 다 됐어요!</span>
          <button class="ended-banner__close" aria-label="알림 닫기">×</button>
        </div>

        <div class="state-indicator state-indicator--running" aria-live="polite">
          <span class="state-indicator__dot"></span>
          진행 중
        </div>

        <!-- display: running → text-primary -->
        <div class="display display--running" role="timer" aria-live="off" aria-label="남은 시간">
          <span>4</span>
          <span class="display__colon" aria-hidden="true">:</span>
          <span>37</span>
        </div>

        <!-- 입력 폼: running 에서 숨김 -->
        <!-- 컨트롤: 일시정지 버튼 -->
        <div class="controls">
          <button class="btn--primary-lg" aria-label="타이머 일시정지">
            ⏸ 일시정지
          </button>
          <button class="btn--ghost-lg" aria-label="타이머 리셋">
            ⟲ 리셋
          </button>
        </div>

        <p class="kbd-hint">
          <kbd>Space</kbd> 일시정지
          &nbsp;·&nbsp;
          <kbd>Esc</kbd> 리셋
        </p>
      </section>

      <!-- ═══════════════════════════════════════════
           STATE 2b: PAUSED (일시정지)
      ═══════════════════════════════════════════ -->
      <div class="mockup-divider"><span>State 2b — PAUSED (일시정지)</span></div>

      <section class="timer-card" aria-label="타이머 — Paused 상태">
        <div class="ended-banner" hidden role="alert" aria-live="assertive">
          <span class="ended-banner__icon" aria-hidden="true">⏰</span>
          <span class="ended-banner__text">시간이 다 됐어요!</span>
          <button class="ended-banner__close" aria-label="알림 닫기">×</button>
        </div>

        <div class="state-indicator state-indicator--paused" aria-live="polite">
          <span class="state-indicator__dot"></span>
          일시정지
        </div>

        <!-- display: paused → timer-paused 컬러 -->
        <div class="display display--paused" role="timer" aria-live="off" aria-label="남은 시간">
          <span>4</span>
          <span class="display__colon" aria-hidden="true">:</span>
          <span>37</span>
        </div>

        <div class="controls">
          <button class="btn--primary-lg" aria-label="타이머 재개">
            ▶ 재개
          </button>
          <button class="btn--ghost-lg" aria-label="타이머 리셋">
            ⟲ 리셋
          </button>
        </div>

        <p class="kbd-hint">
          <kbd>Space</kbd> 재개
          &nbsp;·&nbsp;
          <kbd>Esc</kbd> 리셋
        </p>
      </section>

      <!-- ═══════════════════════════════════════════
           STATE 3: ENDED (종료) — flash + 배너 [AC-4]
      ═══════════════════════════════════════════ -->
      <div class="mockup-divider"><span>State 3 — ENDED (종료 알림)</span></div>

      <section class="timer-card" aria-label="타이머 — Ended 상태">
        <!-- 종료 배너: 표시됨 (AC-4) -->
        <div class="ended-banner banner-slide-in" role="alert" aria-live="assertive">
          <span class="ended-banner__icon" aria-hidden="true">⏰</span>
          <span class="ended-banner__text">시간이 다 됐어요!</span>
          <button class="ended-banner__close" aria-label="알림 닫기">×</button>
        </div>

        <div class="state-indicator state-indicator--ended" aria-live="polite">
          <span class="state-indicator__dot"></span>
          종료
        </div>

        <!-- display: ended → timer-ended-text + flash/pulse (AC-4) -->
        <div class="display display--ended" role="timer" aria-live="off" aria-label="남은 시간 0:00">
          <span>0</span>
          <span class="display__colon" aria-hidden="true">:</span>
          <span>00</span>
        </div>

        <!-- 컨트롤: 시작 비활성, 리셋 활성 -->
        <div class="controls">
          <button class="btn--primary-lg" disabled aria-label="타이머 시작 (리셋 후 가능)">
            ▶ 시작
          </button>
          <button class="btn--ghost-lg" aria-label="타이머 리셋">
            ⟲ 리셋
          </button>
        </div>

        <p class="kbd-hint">
          <kbd>Esc</kbd> 리셋
        </p>
      </section>

    </div>
  </main>

  <!-- ─────────────────────────────────────────────────
       Mockup 인터랙션 (AC-5, AC-6, AC-7)
       · 테마 토글: bf-theme localStorage 패턴 실제 동작
       · idle display 동기: 입력값 → display 반영
  ───────────────────────────────────────────────── -->
  <script>
    // 테마 토글 (§5.3) [AC-5, AC-7]
    var toggle = document.getElementById('theme-toggle');
    function updateToggle() {
      var isDark = document.documentElement.getAttribute('data-theme') !== 'light';
      toggle.textContent = isDark ? '☀️' : '🌙';
      toggle.setAttribute('aria-label', isDark ? '라이트 테마로 전환' : '다크 테마로 전환');
    }
    toggle.addEventListener('click', function() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = (current === 'light') ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('bf-theme', next);
      updateToggle();
    });
    updateToggle();

    // idle display 동기 (§4.4) — mockup 체험용
    var inputM = document.getElementById('input-m');
    var inputS = document.getElementById('input-s');
    var dispM  = document.getElementById('disp-m-idle');
    var dispS  = document.getElementById('disp-s-idle');
    function syncDisplay() {
      var m = parseInt(inputM.value, 10) || 0;
      var s = parseInt(inputS.value, 10) || 0;
      dispM.textContent = m;
      dispS.textContent = String(s).padStart(2, '0');
      // 값이 있으면 display color 변경
      var display = dispM.closest('.display');
      if (m > 0 || s > 0) {
        display.classList.remove('display--empty');
        display.style.color = '';
      } else {
        display.style.color = 'var(--color-text-muted)';
      }
      // bf-timer-last-config 저장 (AC-9)
      try {
        localStorage.setItem('bf-timer-last-config', JSON.stringify({m:m, s:s}));
      } catch(e) {}
    }
    inputM.addEventListener('input', syncDisplay);
    inputS.addEventListener('input', syncDisplay);

    // bf-timer-last-config 복원 (§6) [AC-9]
    try {
      var saved = JSON.parse(localStorage.getItem('bf-timer-last-config'));
      if (saved && typeof saved.m === 'number') {
        inputM.value = saved.m;
        inputS.value = saved.s;
        syncDisplay();
      }
    } catch(e) {}

    // ended-banner 닫기 버튼 (mockup 체험용)
    document.querySelectorAll('.ended-banner__close').forEach(function(btn) {
      btn.addEventListener('click', function() {
        btn.closest('.ended-banner').hidden = true;
      });
    });

    // primary idle 버튼 — 시작 버튼 호버 데모
    var btnPrimaryIdle = document.getElementById('btn-primary-idle');
    if (btnPrimaryIdle) {
      inputM.addEventListener('input', function() {
        var m = parseInt(inputM.value,10)||0;
        var s = parseInt(inputS.value,10)||0;
        btnPrimaryIdle.disabled = (m === 0 && s === 0);
      });
      inputS.addEventListener('input', function() {
        var m = parseInt(inputM.value,10)||0;
        var s = parseInt(inputS.value,10)||0;
        btnPrimaryIdle.disabled = (m === 0 && s === 0);
      });
      // 초기 상태 체크
      var initM = parseInt(inputM.value,10)||0;
      var initS = parseInt(inputS.value,10)||0;
      btnPrimaryIdle.disabled = (initM === 0 && initS === 0);
    }
  </script>
</body>
</html>
