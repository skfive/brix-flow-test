<!doctype html>
<html lang="ko" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snake 아케이드 · /phase18-games/snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="snake-app">
      <!-- 상단 타이틀바 (design §4.1) -->
      <header class="snake-topbar">
        <h1 class="snake-topbar__title">Snake 아케이드</h1>
      </header>

      <!-- 스코어보드 (design §5.2) — 라이브 리전 -->
      <section
        class="scoreboard"
        role="status"
        aria-live="polite"
        aria-atomic="true"
        aria-label="점수 0점, 최고 0점"
      >
        <div class="scoreboard__cell">
          <span class="scoreboard__label">점수</span>
          <span class="scoreboard__value" data-role="score">0</span>
        </div>
        <div class="scoreboard__cell">
          <span class="scoreboard__label">최고</span>
          <span class="scoreboard__value" data-role="high-score">0</span>
        </div>
      </section>

      <!-- 게임 보드 + 상태 오버레이 (design §5.3) -->
      <div class="board-wrap">
        <canvas
          id="board"
          class="board"
          width="400"
          height="400"
          role="img"
          aria-label="Snake 게임 보드, 점수 0"
        ></canvas>

        <!-- 상태 오버레이 (data-state 로 내용 전환) -->
        <div class="board-overlay" data-state="start" id="overlay" role="status">
          <div class="board-overlay__card">
            <div class="overlay__icon" id="overlay-icon" aria-hidden="true"></div>
            <h2 class="overlay__title" id="overlay-title" tabindex="-1">
              Snake 아케이드
            </h2>
            <p class="overlay__desc" id="overlay-desc">
              방향키/버튼으로 뱀을 조종해 먹이를 먹으세요
            </p>
            <p class="overlay__reason" id="overlay-reason" hidden></p>
            <p class="overlay__stat" id="overlay-stat" hidden></p>
            <div class="overlay__actions">
              <button type="button" class="btn btn--primary" id="btn-start">
                시작
              </button>
              <button type="button" class="btn btn--primary" id="btn-resume" hidden>
                계속하기
              </button>
              <button type="button" class="btn btn--primary" id="btn-again" hidden>
                다시하기
              </button>
              <button type="button" class="btn btn--ghost" id="btn-menu" hidden>
                메뉴로
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- 360px 방향 컨트롤 D-pad (design §5.4) -->
      <nav class="dpad" aria-label="방향 컨트롤">
        <button
          type="button"
          class="dpad__btn dpad__btn--up"
          data-dir="up"
          aria-label="위로"
        >
          ▲
        </button>
        <button
          type="button"
          class="dpad__btn dpad__btn--left"
          data-dir="left"
          aria-label="왼쪽"
        >
          ◀
        </button>
        <button
          type="button"
          class="dpad__btn dpad__btn--right"
          data-dir="right"
          aria-label="오른쪽"
        >
          ▶
        </button>
        <button
          type="button"
          class="dpad__btn dpad__btn--down"
          data-dir="down"
          aria-label="아래로"
        >
          ▼
        </button>
      </nav>

      <!-- 조작 안내 + 컨트롤 버튼 (design §5.5·§5.6) -->
      <section class="controls">
        <p class="controls__hint">
          방향키(↑↓←→) · WASD 또는 아래 버튼으로 이동 · P 일시정지 · Enter
          시작/재시작
        </p>
        <div class="controls__buttons">
          <button type="button" class="btn btn--secondary" id="btn-pause" disabled>
            일시정지
          </button>
          <button type="button" class="btn btn--ghost" id="btn-restart">
            재시작
          </button>
        </div>
      </section>

      <!-- JS 비활성 폴백 (planner §8.4) -->
      <noscript>
        <div class="snake-noscript">
          이 게임은 JavaScript가 필요합니다. 브라우저에서 JavaScript를 활성화해
          주세요.
        </div>
      </noscript>
    </main>

    <!-- 비-module script — file:// CORS 안전 (planner §13) -->
    <script src="./logic.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
