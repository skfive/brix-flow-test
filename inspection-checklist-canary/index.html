<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>현장 점검 체크리스트 — inspection-checklist-canary</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="icc-app">
    <!-- ===== Header ===== -->
    <header class="icc-header">
      <h1 class="icc-header__title">현장 점검 체크리스트</h1>
      <div class="icc-header__stats" id="icc-stats" aria-live="polite">
        <!-- app.js 가 집계 칩 렌더 (총/미배정/차단) -->
      </div>
    </header>

    <!-- 손상 데이터 복구 경고 배너 — 손상 감지 복구 시 app.js 가 노출 (AC-3) -->
    <div class="icc-notice" id="icc-notice" role="alert" hidden>
      <span class="icc-notice__icon" aria-hidden="true">▲</span>
      <span id="icc-notice-text">저장된 데이터가 손상되어 기본 데이터로 복구했습니다.</span>
      <button class="icc-notice__close" id="icc-notice-close" type="button">닫기</button>
    </div>

    <div class="icc-body">
      <!-- ===== Board (4 columns) — app.js 렌더 ===== -->
      <main class="icc-board" id="icc-board" aria-label="칸반 보드"></main>

      <!-- ===== Detail panel — app.js 렌더 (초기: 미선택 placeholder) ===== -->
      <aside class="icc-detail" id="icc-detail" role="region" aria-label="상세"></aside>
    </div>
  </div>

  <!-- 비-module script — file:// CORS 안전 (vanilla-static). 도메인 로직 → DOM 순 -->
  <script src="./storage.js"></script>
  <script src="./app.js"></script>
</body>
</html>
