<!doctype html>
<html lang="ko" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>서비스 상태 · /demo/status</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1 class="topbar__title">서비스 상태</h1>
    </header>

    <main class="page">
      <!-- 전체 요약 배너 — main.js 가 fixture 파생값으로 1회 렌더 (기획 §3.3) -->
      <section
        class="summary-banner"
        id="summary-banner"
        aria-label="전체 서비스 상태 요약"
      ></section>

      <!-- 서비스별 상태 카드 목록 — main.js 가 fixture 로 1회 렌더 (기획 §3.1/§4.1) -->
      <ul class="status-list" id="status-list" aria-label="서비스별 상태 목록"></ul>

      <noscript>
        <p class="noscript-note">
          이 페이지는 서비스 상태 배지를 표시합니다. JavaScript 를 활성화해 주세요.
        </p>
      </noscript>
    </main>

    <script type="module" src="main.js"></script>
  </body>
</html>
