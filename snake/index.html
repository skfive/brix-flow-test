<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- 전체 화면 캔버스 (100vw × 100vh) — BF-504 AC §1 -->
    <canvas id="game-canvas" aria-label="Snake 게임 캔버스"></canvas>

    <!-- 이팩트 레이어 — BF-536 -->
    <div id="effect-layer" aria-hidden="true"></div>

    <!-- 아이템 시스템 HUD — BF-545 (명세 §6-2) -->
    <div id="buff-bar" aria-label="활성 버프 상태" hidden></div>
    <div id="item-slot-hud" aria-label="보유 아이템">
      <div class="slot-label">HOLD</div>
      <div class="slot-box" data-state="empty">
        <span class="slot-icon" aria-hidden="true">—</span>
        <span class="slot-key-hint">[Z]</span>
        <span class="slot-expire"></span>
      </div>
    </div>
    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- HUD 상태 패널 (길이·속도) — BF-560 (명세 §5-1, §7-2) -->
    <div id="hud-status-panel" role="status" aria-live="polite" aria-label="뱀 상태">
      <div class="hud-status-row">
        <span class="hud-status-label">길이</span>
        <span id="hud-snake-length" class="hud-status-value">3</span>
      </div>
      <div class="hud-status-row">
        <span class="hud-status-label">속도</span>
        <span id="hud-speed-level" class="hud-status-value" data-speed="NORMAL">○●○</span>
      </div>
    </div>

    <!-- FIXME(BF-563): 효과음 토글 버튼 — #hud 바로 앞에 배치 -->
    <button
      id="sound-toggle"
      type="button"
      aria-label="효과음 켜짐 — 클릭하여 끄기"
      aria-pressed="true"
    >🔊</button>

    <!-- HUD: 우측 상단 PLAYER / CPU 점수 동시 표시 — BF-530 s2 §5-3 -->
    <!-- hud-score-value: BF-504/514/518 하위 호환 별칭 (hud-player-score 와 동기화) -->
    <div id="hud" aria-live="polite" aria-label="점수 현황">
      <div class="hud-row">
        <span class="hud-label player-label">PLAYER</span>
        <span class="hud-score player-score" id="hud-player-score" aria-label="플레이어 점수">0</span>
        <span class="hud-divider">|</span>
        <span class="hud-label cpu-label">CPU</span>
        <span class="hud-score cpu-score" id="hud-cpu-score" aria-label="CPU 점수">0</span>
      </div>
      <div class="hud-high">Best: <span id="hud-high-value">0</span></div>
      <!-- BF-504/514/518 회귀 가드: hud-score-value 별칭 (hidden) -->
      <span id="hud-score-value" hidden aria-hidden="true">0</span>
    </div>

    <!-- 배수 아이템 통계 — BF-531 (좌측 상단 고정) -->
    <div id="multiplier-stats" aria-label="배수 아이템 통계" aria-live="polite">
      <div class="ms-title">배수 통계</div>
      <div class="ms-row" id="ms-row-1">
        <span class="ms-badge ms-1x">1×</span>
        <span class="ms-count" id="ms-count-1">0</span>건
        <span class="ms-prob" id="ms-prob-1">(—)</span>
      </div>
      <div class="ms-row" id="ms-row-2">
        <span class="ms-badge ms-2x">2×</span>
        <span class="ms-count" id="ms-count-2">0</span>건
        <span class="ms-prob" id="ms-prob-2">(—)</span>
      </div>
      <div class="ms-row" id="ms-row-4">
        <span class="ms-badge ms-4x">4×</span>
        <span class="ms-count" id="ms-count-4">0</span>건
        <span class="ms-prob" id="ms-prob-4">(—)</span>
      </div>
      <div class="ms-row" id="ms-row-8">
        <span class="ms-badge ms-8x">8×</span>
        <span class="ms-count" id="ms-count-8">0</span>건
        <span class="ms-prob" id="ms-prob-8">(—)</span>
      </div>
    </div>

    <!-- 범례: 좌하단 고정 — BF-530 s2 §5-2 -->
    <div id="competition-legend" aria-label="지렁이 범례">
      <span class="legend-item player">● PLAYER</span>
      <span class="legend-item cpu">● CPU</span>
    </div>

    <!-- Game Over 오버레이 (경쟁 모드 확장) — BF-530 s2 §5-4 / BF-504 회귀 호환
         BF-560: 통계 화면 확장 (최종 점수·신기록·플레이 시간·아이템 카운트) -->
    <div id="gameover-overlay" hidden role="dialog" aria-modal="true" aria-label="게임 결과">
      <div class="gameover-box">
        <h2 id="go-result">YOU WIN</h2>

        <!-- 최종 점수 블록 — BF-560 -->
        <p class="go-score">
          PLAYER: <span id="go-score">0</span>
          &nbsp;vs&nbsp;
          CPU: <span id="go-cpu-score">0</span>
        </p>

        <!-- 신기록 배지 — BF-560 (hidden 기본, 신기록 시 JS 에서 해제) -->
        <p id="go-new-record" hidden aria-live="polite">★ 신기록!</p>

        <!-- 이전 최고 점수 — BF-560 (hidden 기본) -->
        <p id="go-prev-high-score" hidden class="go-prev-score"></p>

        <!-- 플레이 시간 — BF-560 -->
        <p id="go-play-time" class="go-play-time"></p>

        <!-- 섹션 구분선 -->
        <hr class="go-divider" aria-hidden="true" />

        <!-- 아이템 획득 현황 — BF-560 (명세 §5-3) -->
        <section id="go-item-stats" aria-label="아이템 획득 현황">
          <p class="go-item-section-title">아이템 획득 현황</p>
          <ul class="go-item-list">
            <li data-item-type="SPEED_UP"     data-item-count="0"><span class="go-item-icon">⚡</span><span class="go-item-label">SPEED UP</span><span class="go-item-count">×0</span></li>
            <li data-item-type="SLOW_DOWN"    data-item-count="0"><span class="go-item-icon">⏱</span><span class="go-item-label">SLOW DOWN</span><span class="go-item-count">×0</span></li>
            <li data-item-type="LENGTH_BURST" data-item-count="0"><span class="go-item-icon">★</span><span class="go-item-label">LENGTH BURST</span><span class="go-item-count">×0</span></li>
            <li data-item-type="SHIELD"       data-item-count="0"><span class="go-item-icon">🛡</span><span class="go-item-label">SHIELD</span><span class="go-item-count">×0</span></li>
            <li data-item-type="REVERSE"      data-item-count="0"><span class="go-item-icon">↺</span><span class="go-item-label">REVERSE</span><span class="go-item-count">×0</span></li>
          </ul>
        </section>

        <p class="go-hint">Press Space to restart</p>
      </div>
    </div>

    <!-- PAUSED 오버레이 — BF-524 / BF-560: 버튼 3종 + 타이틀 한국어 전환 (명세 §5-2) -->
    <div id="paused-overlay" hidden role="dialog" aria-modal="true" aria-label="일시정지">
      <div class="paused-box">
        <h2 class="paused-title">일시정지</h2>
        <div class="paused-btn-container">
          <button id="paused-btn-resume"  class="paused-btn" type="button">계속하기 <kbd>P</kbd></button>
          <button id="paused-btn-restart" class="paused-btn" type="button">재시작 <kbd>R</kbd></button>
          <button id="paused-btn-quit"    class="paused-btn" type="button">종료 <kbd>Q</kbd></button>
        </div>
      </div>
    </div>

    <!-- BF-518: file:// CORS 회피 — 인라인 로직 글로벌 폴백 스크립트
         BF-530: cpuChooseDir / tickFull / 확장된 createInitialState 추가
         BF-533: pickMultiplier / spawnFoodWithMultiplier / pendingGrowth / multiplierStats 추가
         BF-545: 아이템 시스템 (ITEMS_ENABLED, pickItemType, spawnItemCell 등) 추가 -->
    <script>
    (function () {
      "use strict";
      var CELL = 20;
      var LS_HIGH_SCORE_KEY = "bf-snake-high-score";
      var DIR = {
        UP:    { x:  0, y: -1 },
        DOWN:  { x:  0, y:  1 },
        LEFT:  { x: -1, y:  0 },
        RIGHT: { x:  1, y:  0 },
      };

      // ── 난이도 파라미터 (s1 §2) ──────────────────────────────
      var DIFFICULTY_PARAMS = {
        normal: { tickIntervalMs: 120, visionRange: 8,  avoidanceThreshold: 5,  respawnDelayTicks: 20, foodPriorityWeight: 0.7 },
        easy:   { tickIntervalMs: 240, visionRange: 3,  avoidanceThreshold: 2,  respawnDelayTicks: 10, foodPriorityWeight: 0.4 },
      };

      // ── 배수 아이템 (BF-533, 명세 §3) ───────────────────────
      var MULTIPLIER_WEIGHTS = [
        { m: 1, weight: 55 },
        { m: 2, weight: 28 },
        { m: 4, weight: 13 },
        { m: 8, weight:  4 },
      ];
      var TOTAL_WEIGHT = 100;
      var MULTIPLIER_COLORS = {
        1: { fill: "#ffcc00", glow: "rgba(255,200,0,0.3)" },
        2: { fill: "#00cfff", glow: "rgba(0,200,255,0.4)" },
        4: { fill: "#cc44ff", glow: "rgba(180,60,255,0.5)" },
        8: { fill: "#ff4444", glow: "rgba(255,50,50,0.6)" },
      };

      function pickMultiplier() {
        var r = Math.random() * TOTAL_WEIGHT;
        var cumulative = 0;
        for (var i = 0; i < MULTIPLIER_WEIGHTS.length; i++) {
          cumulative += MULTIPLIER_WEIGHTS[i].weight;
          if (r < cumulative) return MULTIPLIER_WEIGHTS[i].m;
        }
        return 1;
      }

      function createMultiplierStats() {
        return {
          "1": { spawned: 0, eaten: 0 },
          "2": { spawned: 0, eaten: 0 },
          "4": { spawned: 0, eaten: 0 },
          "8": { spawned: 0, eaten: 0 },
        };
      }

      function isWallCollision(head, cols, rows) {
        return head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows;
      }

      function isSelfCollision(head, body) {
        return body.some(function (seg) { return seg.x === head.x && seg.y === head.y; });
      }

      function spawnFoodCell(cols, rows, snake) {
        var occupied = new Set(snake.map(function (c) { return c.x + "," + c.y; }));
        var empty = [];
        for (var y = 0; y < rows; y++) {
          for (var x = 0; x < cols; x++) {
            if (!occupied.has(x + "," + y)) empty.push({ x: x, y: y });
          }
        }
        if (empty.length === 0) return null;
        return empty[Math.floor(Math.random() * empty.length)];
      }

      // BF-533: 배수 포함 스폰 (명세 §3-3, §6-1)
      function spawnFoodWithMultiplier(cols, rows, occupiedCells) {
        var cell = spawnFoodCell(cols, rows, occupiedCells);
        if (cell === null) return null;
        return { x: cell.x, y: cell.y, multiplier: pickMultiplier() };
      }

      // BF-530+BF-533: CPU 지렁이 포함 초기 상태
      function createInitialState(cols, rows, highScore) {
        if (highScore === undefined) highScore = 0;
        var midX = Math.floor(cols / 2);
        var midY = Math.floor(rows / 2);
        var snake = [
          { x: midX,     y: midY },
          { x: midX - 1, y: midY },
          { x: midX - 2, y: midY },
        ];
        var cpuX = Math.max(0, Math.min(cols - 3, Math.floor(cols * 3 / 4) - 1));
        var cpuY = Math.max(0, Math.min(rows - 1, Math.floor(rows * 3 / 4)));
        var cpu = [
          { x: cpuX,     y: cpuY },
          { x: cpuX + 1, y: cpuY },
          { x: cpuX + 2, y: cpuY },
        ].filter(function(c) { return c.x >= 0 && c.x < cols && c.y >= 0 && c.y < rows; });

        // BF-533: 첫 번째 food 스폰 + 통계 초기화
        var initialFood = spawnFoodWithMultiplier(cols, rows, snake.concat(cpu));
        var initialStats = createMultiplierStats();
        if (initialFood !== null) {
          initialStats[String(initialFood.multiplier)].spawned++;
        }

        return {
          cols:             cols,
          rows:             rows,
          snake:            snake,
          dir:              DIR.RIGHT,
          nextDir:          DIR.RIGHT,
          cpu:              cpu,
          cpuDir:           DIR.LEFT,
          food:             initialFood,
          score:            0,
          cpuScore:         0,
          highScore:        highScore,
          status:           "playing",
          result:           null,
          deathCause:       null,
          // BF-533
          pendingGrowth:    0,
          cpuPendingGrowth: 0,
          multiplierStats:  initialStats,
          // BF-545: 아이템 시스템 상태 필드 (명세 부록 A)
          item:                 null,
          heldItem:             null,
          shieldActive:         false,
          cpuReverseTicksLeft:  0,
          speedStack:           [],
          lengthBurstActive:    false,
          lengthBeforeBurst:    0,
          lengthBurstEndMs:     0,
          cpuLengthBurstActive: false,
          cpuLengthBeforeBurst: 0,
          cpuLengthBurstEndMs:  0,
          itemStats:            createItemStats(),
        };
      }

      function changeDirection(state, newDir) {
        var cur = state.dir;
        if (cur.x + newDir.x === 0 && cur.y + newDir.y === 0) return state;
        return Object.assign({}, state, { nextDir: newDir });
      }

      // BF-533: tick — pendingGrowth 방식 (명세 §4-2)
      function tick(state) {
        if (state.status !== "playing") return state;
        var dir = state.nextDir;
        var head = state.snake[0];
        var newHead = { x: head.x + dir.x, y: head.y + dir.y };
        if (isWallCollision(newHead, state.cols, state.rows)) {
          var hs1 = Math.max(state.highScore, state.score);
          return Object.assign({}, state, { dir: dir, status: "gameover", highScore: hs1 });
        }
        if (isSelfCollision(newHead, state.snake)) {
          var hs2 = Math.max(state.highScore, state.score);
          return Object.assign({}, state, { dir: dir, status: "gameover", highScore: hs2 });
        }
        var ateFood =
          state.food !== null &&
          newHead.x === state.food.x &&
          newHead.y === state.food.y;

        var M = ateFood ? ((state.food && state.food.multiplier) || 1) : 0;
        var newPendingGrowth = (state.pendingGrowth || 0) + M;
        var newSnake;
        if (newPendingGrowth > 0) {
          newSnake = [newHead].concat(state.snake);
          newPendingGrowth--;
        } else {
          newSnake = [newHead].concat(state.snake.slice(0, -1));
        }

        var newScore = ateFood ? state.score + M * 10 : state.score;
        var newMultiplierStats = state.multiplierStats || createMultiplierStats();
        var newFood = state.food;
        if (ateFood) {
          var eatenKey = String(M);
          newMultiplierStats = Object.assign({}, newMultiplierStats);
          newMultiplierStats[eatenKey] = {
            spawned: newMultiplierStats[eatenKey].spawned,
            eaten:   newMultiplierStats[eatenKey].eaten + 1,
          };
          var spawned = spawnFoodWithMultiplier(state.cols, state.rows, newSnake);
          newFood = spawned;
          if (spawned !== null) {
            var spawnKey = String(spawned.multiplier);
            newMultiplierStats[spawnKey] = {
              spawned: newMultiplierStats[spawnKey].spawned + 1,
              eaten:   newMultiplierStats[spawnKey].eaten,
            };
          }
        }

        return Object.assign({}, state, {
          snake:           newSnake,
          dir:             dir,
          food:            newFood,
          score:           newScore,
          highScore:       Math.max(state.highScore, newScore),
          status:          "playing",
          pendingGrowth:   newPendingGrowth,
          multiplierStats: newMultiplierStats,
        });
      }

      function restartGame(state) {
        return createInitialState(state.cols, state.rows, state.highScore);
      }

      // ── CPU AI (s1 §3) ────────────────────────────────────────

      function lookAhead(cpuHead, dir, maxDepth, cols, rows, occupiedSet) {
        var pos = cpuHead;
        var count = 0;
        while (count < maxDepth) {
          pos = { x: pos.x + dir.x, y: pos.y + dir.y };
          if (isWallCollision(pos, cols, rows) || occupiedSet.has(pos.x + "," + pos.y)) break;
          count++;
        }
        return count;
      }

      function computeFoodScore(cpuHead, candidateDir, food) {
        if (!food) return 0;
        var nextPos = { x: cpuHead.x + candidateDir.x, y: cpuHead.y + candidateDir.y };
        var distBefore = Math.abs(cpuHead.x - food.x) + Math.abs(cpuHead.y - food.y);
        var distAfter  = Math.abs(nextPos.x - food.x) + Math.abs(nextPos.y - food.y);
        if (distAfter < distBefore) return 1.0;
        if (distAfter === distBefore) return 0.5;
        return 0.0;
      }

      function cpuChooseDir(state, difficulty) {
        if (!difficulty) difficulty = "normal";
        var cpu = state.cpu;
        var cpuDir = state.cpuDir;
        var snake = state.snake;
        var food = state.food;
        var cols = state.cols;
        var rows = state.rows;
        if (!cpu || cpu.length === 0) return cpuDir;
        var params = DIFFICULTY_PARAMS[difficulty] || DIFFICULTY_PARAMS.normal;
        var cpuHead = cpu[0];
        var allDirs = [DIR.UP, DIR.DOWN, DIR.LEFT, DIR.RIGHT];
        var occupiedSet = new Set();
        snake.forEach(function(s) { occupiedSet.add(s.x + "," + s.y); });
        cpu.slice(1).forEach(function(s) { occupiedSet.add(s.x + "," + s.y); });
        var candidates = allDirs.filter(function(d) {
          if (d.x + cpuDir.x === 0 && d.y + cpuDir.y === 0) return false;
          var nx = cpuHead.x + d.x;
          var ny = cpuHead.y + d.y;
          if (isWallCollision({ x: nx, y: ny }, cols, rows)) return false;
          if (occupiedSet.has(nx + "," + ny)) return false;
          return true;
        });
        if (candidates.length === 0) return cpuDir;
        var scored = candidates.map(function(dir) {
          var safeLen   = lookAhead(cpuHead, dir, params.visionRange, cols, rows, occupiedSet);
          var foodScore = computeFoodScore(cpuHead, dir, food);
          var score;
          if (safeLen < params.avoidanceThreshold) {
            score = safeLen * 0.1;
          } else {
            score = safeLen   * (1 - params.foodPriorityWeight)
                  + foodScore * params.foodPriorityWeight;
          }
          return { dir: dir, score: score };
        });
        scored.sort(function(a, b) { return b.score - a.score; });
        return scored[0].dir;
      }

      // ── 경쟁 게임 틱 (s2 §2~§3) + BF-533 pendingGrowth ────

      function tickFull(state, difficulty) {
        if (!difficulty) difficulty = "normal";
        if (state.status !== "playing") return state;

        var newCpuDir  = cpuChooseDir(state, difficulty);
        var cpuHead    = state.cpu[0];
        var newCpuHead = { x: cpuHead.x + newCpuDir.x, y: cpuHead.y + newCpuDir.y };
        var dir        = state.nextDir;
        var head       = state.snake[0];
        var newHead    = { x: head.x + dir.x, y: head.y + dir.y };

        // T4: head-on
        var headOn = newHead.x === newCpuHead.x && newHead.y === newCpuHead.y;

        var playerHitWall = isWallCollision(newHead,    state.cols, state.rows);
        var cpuHitWall    = isWallCollision(newCpuHead, state.cols, state.rows);
        var playerHitSelf = isSelfCollision(newHead,    state.snake);
        var cpuHitSelf    = isSelfCollision(newCpuHead, state.cpu);
        var playerHitCPU  = !headOn && state.cpu.some(function(s)   { return s.x === newHead.x    && s.y === newHead.y; });
        var cpuHitPlayer  = !headOn && state.snake.some(function(s) { return s.x === newCpuHead.x && s.y === newCpuHead.y; });

        var playerDead = headOn || playerHitWall || playerHitSelf || playerHitCPU;
        var cpuDead    = headOn || cpuHitWall    || cpuHitSelf    || cpuHitPlayer;

        if (playerDead || cpuDead) {
          var result, deathCause = null;
          if (playerDead && cpuDead) {
            result = "draw";
            deathCause = headOn ? "head_on" : (playerHitWall ? "wall" : playerHitSelf ? "self" : "cpu_body");
          } else if (playerDead) {
            result = "cpu_win";
            if (headOn)          deathCause = "head_on";
            else if (playerHitWall)  deathCause = "wall";
            else if (playerHitSelf)  deathCause = "self";
            else if (playerHitCPU)   deathCause = "cpu_body";
          } else {
            result = "player_win";
            deathCause = null;
          }
          var newHighScore = Math.max(state.highScore, state.score);
          return Object.assign({}, state, {
            dir:        dir,
            cpuDir:     newCpuDir,
            status:     "gameover",
            highScore:  newHighScore,
            result:     result,
            deathCause: deathCause,
          });
        }

        var playerAteFood = state.food !== null && newHead.x === state.food.x && newHead.y === state.food.y;
        var cpuAteFood    = state.food !== null && !playerAteFood && newCpuHead.x === state.food.x && newCpuHead.y === state.food.y;

        // BF-533: 배수 적용 (명세 §4-2, §5)
        var foodM   = (state.food && state.food.multiplier) || 1;
        var playerM = playerAteFood ? foodM : 0;
        var cpuM    = cpuAteFood    ? foodM : 0;

        var newPlayerPending = (state.pendingGrowth    || 0) + playerM;
        var newCpuPending    = (state.cpuPendingGrowth || 0) + cpuM;

        var newSnake;
        if (newPlayerPending > 0) {
          newSnake = [newHead].concat(state.snake);
          newPlayerPending--;
        } else {
          newSnake = [newHead].concat(state.snake.slice(0, -1));
        }

        var newCPU;
        if (newCpuPending > 0) {
          newCPU = [newCpuHead].concat(state.cpu);
          newCpuPending--;
        } else {
          newCPU = [newCpuHead].concat(state.cpu.slice(0, -1));
        }

        var newScore    = playerAteFood ? state.score    + playerM * 10 : state.score;
        var newCPUScore = cpuAteFood    ? state.cpuScore + cpuM    * 10 : state.cpuScore;

        // BF-533: multiplierStats 카운트 + 새 food 스폰
        var newMultiplierStats = Object.assign({}, state.multiplierStats || createMultiplierStats());
        if (playerAteFood || cpuAteFood) {
          var eatenKey = String(foodM);
          newMultiplierStats[eatenKey] = {
            spawned: newMultiplierStats[eatenKey].spawned,
            eaten:   newMultiplierStats[eatenKey].eaten + 1,
          };
        }
        var newFood = state.food;
        if (playerAteFood || cpuAteFood) {
          var spawnedFood = spawnFoodWithMultiplier(state.cols, state.rows, newSnake.concat(newCPU));
          newFood = spawnedFood;
          if (spawnedFood !== null) {
            var spawnKey = String(spawnedFood.multiplier);
            newMultiplierStats[spawnKey] = {
              spawned: newMultiplierStats[spawnKey].spawned + 1,
              eaten:   newMultiplierStats[spawnKey].eaten,
            };
          }
        }

        return Object.assign({}, state, {
          snake:            newSnake,
          dir:              dir,
          cpu:              newCPU,
          cpuDir:           newCpuDir,
          food:             newFood,
          score:            newScore,
          cpuScore:         newCPUScore,
          highScore:        Math.max(state.highScore, newScore),
          status:           "playing",
          result:           null,
          deathCause:       null,
          pendingGrowth:    newPlayerPending,
          cpuPendingGrowth: newCpuPending,
          multiplierStats:  newMultiplierStats,
        });
      }

      // ── BF-545 아이템 시스템 (명세 §2~§10) ─────────────────────

      var ITEMS_ENABLED   = true;
      var ITEM_SPAWN_RATE = 1;

      var ITEM_WEIGHTS = [
        { type: "SPEED_UP",     weight: 25 },
        { type: "SLOW_DOWN",    weight: 25 },
        { type: "LENGTH_BURST", weight: 15 },
        { type: "SHIELD",       weight: 20 },
        { type: "REVERSE",      weight: 15 },
      ];
      var ITEM_TOTAL_WEIGHT = 100;

      var ITEM_CATEGORY = {
        SPEED_UP:     "INSTANT",
        SLOW_DOWN:    "INSTANT",
        LENGTH_BURST: "INSTANT",
        SHIELD:       "HOLDABLE",
        REVERSE:      "HOLDABLE",
      };

      var ITEM_DURATION_MS = {
        SPEED_UP:     5000,
        SLOW_DOWN:    5000,
        LENGTH_BURST: 5000,
        SHIELD:       30000,
        REVERSE:      3000,
      };

      var ITEM_LIFESPAN_MS  = 10000;
      var HOLDABLE_EXPIRE_MS = 30000;

      function createItemStats() {
        return {
          SPEED_UP:     { spawned: 0, acquired: 0, expired: 0, durationCompleted: 0 },
          SLOW_DOWN:    { spawned: 0, acquired: 0, expired: 0, durationCompleted: 0 },
          LENGTH_BURST: { spawned: 0, acquired: 0, expired: 0, durationCompleted: 0, selfDeathDuringBurst: 0 },
          SHIELD:       { spawned: 0, acquired: 0, expired: 0, used: 0, shieldTriggered: 0, dropped: 0 },
          REVERSE:      { spawned: 0, acquired: 0, expired: 0, used: 0, cpuConsumed: 0, dropped: 0 },
        };
      }

      function pickItemType() {
        var r = Math.random() * ITEM_TOTAL_WEIGHT;
        var cumulative = 0;
        for (var i = 0; i < ITEM_WEIGHTS.length; i++) {
          cumulative += ITEM_WEIGHTS[i].weight;
          if (r < cumulative) return ITEM_WEIGHTS[i].type;
        }
        return "SPEED_UP";
      }

      function spawnItemCell(cols, rows, snake, cpu, food) {
        var occupied = new Set();
        snake.forEach(function(c) { occupied.add(c.x + "," + c.y); });
        cpu.forEach(function(c)   { occupied.add(c.x + "," + c.y); });
        if (food) occupied.add(food.x + "," + food.y);
        var empty = [];
        for (var y = 0; y < rows; y++) {
          for (var x = 0; x < cols; x++) {
            if (!occupied.has(x + "," + y)) empty.push({ x: x, y: y });
          }
        }
        if (empty.length === 0) return null;
        return empty[Math.floor(Math.random() * empty.length)];
      }

      function applyInstantEffect(state, itemType, target, nowMs) {
        var expiresAtMs = nowMs + ITEM_DURATION_MS[itemType];
        if (itemType === "SPEED_UP" || itemType === "SLOW_DOWN") {
          var newEntry = { type: itemType, target: target, expiresAtMs: expiresAtMs };
          var filtered = (state.speedStack || []).filter(function(e) {
            return !(e.type === itemType && e.target === target);
          });
          return Object.assign({}, state, { speedStack: filtered.concat([newEntry]) });
        }
        if (itemType === "LENGTH_BURST") {
          var isPlayer = target === "player";
          var snake    = isPlayer ? state.snake : state.cpu;
          var maxCells = Math.floor(state.cols * state.rows * 0.8);
          var newLen   = Math.min(snake.length * 10, maxCells);
          var addCount = Math.max(0, newLen - snake.length);
          var tail     = snake[snake.length - 1];
          var extraSegs = [];
          for (var i = 0; i < addCount; i++) extraSegs.push({ x: tail.x, y: tail.y });
          if (isPlayer) {
            return Object.assign({}, state, {
              snake:             state.snake.concat(extraSegs),
              lengthBurstActive: true,
              lengthBeforeBurst: state.snake.length,
              lengthBurstEndMs:  expiresAtMs,
            });
          } else {
            return Object.assign({}, state, {
              cpu:                  state.cpu.concat(extraSegs),
              cpuLengthBurstActive: true,
              cpuLengthBeforeBurst: state.cpu.length,
              cpuLengthBurstEndMs:  expiresAtMs,
            });
          }
        }
        return state;
      }

      function updateItemTimers(state, nowMs) {
        var ns = state;
        // speedStack 만료
        var expiredSpeed = (ns.speedStack || []).filter(function(e) { return nowMs >= e.expiresAtMs; });
        var activeSpeed  = (ns.speedStack || []).filter(function(e) { return nowMs < e.expiresAtMs; });
        var newStats = Object.assign({}, ns.itemStats || createItemStats());
        expiredSpeed.forEach(function(e) {
          newStats[e.type] = Object.assign({}, newStats[e.type], {
            durationCompleted: newStats[e.type].durationCompleted + 1,
          });
        });
        ns = Object.assign({}, ns, { speedStack: activeSpeed, itemStats: newStats });

        // player LENGTH_BURST 만료
        if (ns.lengthBurstActive && nowMs >= ns.lengthBurstEndMs) {
          var restoreLen = Math.min(ns.lengthBeforeBurst, ns.snake.length);
          ns = Object.assign({}, ns, {
            snake:             ns.snake.slice(0, restoreLen),
            lengthBurstActive: false,
            lengthBeforeBurst: 0,
            lengthBurstEndMs:  0,
            itemStats: Object.assign({}, ns.itemStats, {
              LENGTH_BURST: Object.assign({}, ns.itemStats.LENGTH_BURST, {
                durationCompleted: ns.itemStats.LENGTH_BURST.durationCompleted + 1,
              }),
            }),
          });
        }
        // CPU LENGTH_BURST 만료
        if (ns.cpuLengthBurstActive && nowMs >= ns.cpuLengthBurstEndMs) {
          var cpuRestoreLen = Math.min(ns.cpuLengthBeforeBurst, ns.cpu.length);
          ns = Object.assign({}, ns, {
            cpu:                  ns.cpu.slice(0, cpuRestoreLen),
            cpuLengthBurstActive: false,
            cpuLengthBeforeBurst: 0,
            cpuLengthBurstEndMs:  0,
          });
        }
        // heldItem 만료
        if (ns.heldItem !== null && nowMs >= ns.heldItem.expiresAt) {
          var ht = ns.heldItem.type;
          ns = Object.assign({}, ns, {
            heldItem: null,
            itemStats: Object.assign({}, ns.itemStats, {
              [ht]: Object.assign({}, ns.itemStats[ht], { expired: ns.itemStats[ht].expired + 1 }),
            }),
          });
        }
        // 보드 위 item 만료
        if (ns.item !== null && nowMs >= ns.item.expiresAt) {
          var it = ns.item.type;
          ns = Object.assign({}, ns, {
            item: null,
            itemStats: Object.assign({}, ns.itemStats, {
              [it]: Object.assign({}, ns.itemStats[it], { expired: ns.itemStats[it].expired + 1 }),
            }),
          });
        }
        // cpuReverseTicksLeft 감소
        if (ns.cpuReverseTicksLeft > 0) {
          ns = Object.assign({}, ns, { cpuReverseTicksLeft: ns.cpuReverseTicksLeft - 1 });
        }
        return ns;
      }

      function useHeldItem(state) {
        if (state.status !== "playing" || !state.heldItem) return state;
        var type = state.heldItem.type;
        var updStats = Object.assign({}, state.itemStats);
        updStats[type] = Object.assign({}, updStats[type], { used: (updStats[type].used || 0) + 1 });
        var ns = Object.assign({}, state, { heldItem: null, itemStats: updStats });
        if (type === "SHIELD")  ns = Object.assign({}, ns, { shieldActive: true });
        if (type === "REVERSE") ns = Object.assign({}, ns, { cpuReverseTicksLeft: 25 });
        return ns;
      }

      function tickWithItems(state, nowMs, movePlayer, moveCpu) {
        if (nowMs === undefined) nowMs = Date.now();
        if (movePlayer === undefined) movePlayer = true;
        if (moveCpu    === undefined) moveCpu    = true;
        if (state.status !== "playing") return state;

        var s = updateItemTimers(state, nowMs);

        // CPU 방향 (REVERSE 오버라이드)
        var newCpuDir = moveCpu ? cpuChooseDir(s) : s.cpuDir;
        if (moveCpu && s.cpuReverseTicksLeft > 0) {
          newCpuDir = { x: -newCpuDir.x, y: -newCpuDir.y };
        }

        var dir        = s.nextDir;
        var head       = s.snake[0];
        var cpuHead    = s.cpu[0];
        var newHead    = movePlayer
          ? { x: head.x    + dir.x,       y: head.y    + dir.y       }
          : { x: head.x,                  y: head.y                  };
        var newCpuHead = moveCpu
          ? { x: cpuHead.x + newCpuDir.x, y: cpuHead.y + newCpuDir.y }
          : { x: cpuHead.x,               y: cpuHead.y               };

        // 충돌 검사
        var headOn         = movePlayer && moveCpu && newHead.x === newCpuHead.x && newHead.y === newCpuHead.y;
        var playerHitWall  = movePlayer && isWallCollision(newHead,    s.cols, s.rows);
        var cpuHitWall     = moveCpu    && isWallCollision(newCpuHead, s.cols, s.rows);
        var playerHitSelf  = movePlayer && isSelfCollision(newHead,    s.snake);
        var cpuHitSelf     = moveCpu    && isSelfCollision(newCpuHead, s.cpu);
        var playerHitCPU   = movePlayer && !headOn && s.cpu.some(function(seg)   { return seg.x === newHead.x    && seg.y === newHead.y; });
        var cpuHitPlayer   = moveCpu    && !headOn && s.snake.some(function(seg) { return seg.x === newCpuHead.x && seg.y === newCpuHead.y; });

        var playerDead = headOn || playerHitWall || playerHitSelf || playerHitCPU;
        var cpuDead    = headOn || cpuHitWall    || cpuHitSelf    || cpuHitPlayer;

        // SHIELD 인터셉트
        var shieldTriggered = false;
        if (playerDead && s.shieldActive) {
          playerDead      = false;
          shieldTriggered = true;
        }

        if (playerDead || cpuDead) {
          var result, deathCause = null;
          if (playerDead && cpuDead) {
            result = "draw";
            deathCause = headOn ? "head_on" : playerHitWall ? "wall" : playerHitSelf ? "self" : "cpu_body";
          } else if (playerDead) {
            result = "cpu_win";
            if (headOn) deathCause = "head_on";
            else if (playerHitWall) deathCause = "wall";
            else if (playerHitSelf) deathCause = "self";
            else if (playerHitCPU)  deathCause = "cpu_body";
          } else {
            result = "player_win"; deathCause = null;
          }
          var endStats = Object.assign({}, s.itemStats);
          if (playerDead && s.lengthBurstActive) {
            endStats.LENGTH_BURST = Object.assign({}, endStats.LENGTH_BURST, {
              selfDeathDuringBurst: endStats.LENGTH_BURST.selfDeathDuringBurst + 1,
            });
          }
          return Object.assign({}, s, {
            dir: dir, cpuDir: newCpuDir, status: "gameover",
            highScore: Math.max(s.highScore, s.score),
            result: result, deathCause: deathCause,
            shieldActive: false, itemStats: endStats,
          });
        }

        var newShieldActive = shieldTriggered ? false : s.shieldActive;
        var afterShieldStats = s.itemStats;
        if (shieldTriggered) {
          afterShieldStats = Object.assign({}, afterShieldStats, {
            SHIELD: Object.assign({}, afterShieldStats.SHIELD, {
              shieldTriggered: afterShieldStats.SHIELD.shieldTriggered + 1,
            }),
          });
        }

        // 먹이 처리
        var playerAteFood = movePlayer && s.food !== null && newHead.x === s.food.x && newHead.y === s.food.y;
        var cpuAteFood    = moveCpu && !playerAteFood && s.food !== null && newCpuHead.x === s.food.x && newCpuHead.y === s.food.y;
        var foodM   = (s.food && s.food.multiplier) || 1;
        var playerM = playerAteFood ? foodM : 0;
        var cpuM    = cpuAteFood    ? foodM : 0;
        var newPlayerPending = (s.pendingGrowth    || 0) + playerM;
        var newCpuPending    = (s.cpuPendingGrowth || 0) + cpuM;

        var newSnake;
        if (movePlayer) {
          if (newPlayerPending > 0) { newSnake = [newHead].concat(s.snake); newPlayerPending--; }
          else                       { newSnake = [newHead].concat(s.snake.slice(0, -1)); }
        } else { newSnake = s.snake; }

        var newCPU;
        if (moveCpu) {
          if (newCpuPending > 0) { newCPU = [newCpuHead].concat(s.cpu); newCpuPending--; }
          else                    { newCPU = [newCpuHead].concat(s.cpu.slice(0, -1)); }
        } else { newCPU = s.cpu; }

        var newScore    = playerAteFood ? s.score    + playerM * 10 : s.score;
        var newCPUScore = cpuAteFood    ? s.cpuScore + cpuM    * 10 : s.cpuScore;
        var newMultiplierStats = Object.assign({}, s.multiplierStats || createMultiplierStats());

        if (playerAteFood || cpuAteFood) {
          newMultiplierStats[String(foodM)] = {
            spawned: newMultiplierStats[String(foodM)].spawned,
            eaten:   newMultiplierStats[String(foodM)].eaten + 1,
          };
        }
        var newFood = s.food;
        if (playerAteFood || cpuAteFood) {
          var spawnedFood = spawnFoodWithMultiplier(s.cols, s.rows, newSnake.concat(newCPU));
          newFood = spawnedFood;
          if (spawnedFood) {
            var sk = String(spawnedFood.multiplier);
            newMultiplierStats[sk] = {
              spawned: newMultiplierStats[sk].spawned + 1,
              eaten:   newMultiplierStats[sk].eaten,
            };
          }
        }

        // 아이템 획득 처리
        var curItem  = s.item;
        var curHeld  = s.heldItem;
        var curStats = Object.assign({}, afterShieldStats);
        var stateForItem = Object.assign({}, s, { shieldActive: newShieldActive, itemStats: curStats });

        if (curItem !== null) {
          var playerHitItem = movePlayer && newHead.x === curItem.x && newHead.y === curItem.y;
          var cpuHitItem    = moveCpu && !playerHitItem && newCpuHead.x === curItem.x && newCpuHead.y === curItem.y;

          if (playerHitItem) {
            var itype = curItem.type;
            curStats[itype] = Object.assign({}, curStats[itype], { acquired: curStats[itype].acquired + 1 });
            if (ITEM_CATEGORY[itype] === "INSTANT") {
              stateForItem = applyInstantEffect(Object.assign({}, stateForItem, { itemStats: curStats }), itype, "player", nowMs);
              curStats = stateForItem.itemStats;
            } else {
              if (curHeld !== null && curHeld.type !== itype) {
                curStats[curHeld.type] = Object.assign({}, curStats[curHeld.type], {
                  dropped: curStats[curHeld.type].dropped + 1,
                });
              }
              curHeld = { type: itype, acquiredAt: nowMs, expiresAt: nowMs + HOLDABLE_EXPIRE_MS };
              stateForItem = Object.assign({}, stateForItem, { heldItem: curHeld, itemStats: curStats });
            }
            curItem = null;
          } else if (cpuHitItem) {
            if (ITEM_CATEGORY[curItem.type] === "HOLDABLE") {
              curStats[curItem.type] = Object.assign({}, curStats[curItem.type], {
                cpuConsumed: (curStats[curItem.type].cpuConsumed || 0) + 1,
              });
            } else {
              curStats[curItem.type] = Object.assign({}, curStats[curItem.type], {
                acquired: curStats[curItem.type].acquired + 1,
              });
              stateForItem = applyInstantEffect(Object.assign({}, stateForItem, { itemStats: curStats }), curItem.type, "cpu", nowMs);
              curStats = stateForItem.itemStats;
            }
            curItem = null;
            stateForItem = Object.assign({}, stateForItem, { itemStats: curStats });
          }
        }

        return Object.assign({}, stateForItem, {
          snake:            newSnake,
          dir:              dir,
          cpu:              newCPU,
          cpuDir:           newCpuDir,
          food:             newFood,
          item:             curItem,
          score:            newScore,
          cpuScore:         newCPUScore,
          highScore:        Math.max(s.highScore, newScore),
          status:           "playing",
          result:           null,
          deathCause:       null,
          pendingGrowth:    newPlayerPending,
          cpuPendingGrowth: newCpuPending,
          multiplierStats:  newMultiplierStats,
        });
      }

      // game.js 에서 globalThis 로 참조 (BF-518/522)
      Object.assign(globalThis, {
        CELL:                    CELL,
        LS_HIGH_SCORE_KEY:       LS_HIGH_SCORE_KEY,
        DIR:                     DIR,
        MULTIPLIER_COLORS:       MULTIPLIER_COLORS,
        spawnFoodCell:           spawnFoodCell,
        spawnFoodWithMultiplier: spawnFoodWithMultiplier,
        pickMultiplier:          pickMultiplier,
        createMultiplierStats:   createMultiplierStats,
        createInitialState:      createInitialState,
        changeDirection:         changeDirection,
        isWallCollision:         isWallCollision,
        isSelfCollision:         isSelfCollision,
        tick:                    tick,
        tickFull:                tickFull,
        cpuChooseDir:            cpuChooseDir,
        restartGame:             restartGame,
        // BF-545: 아이템 시스템
        ITEMS_ENABLED:           ITEMS_ENABLED,
        ITEM_SPAWN_RATE:         ITEM_SPAWN_RATE,
        ITEM_WEIGHTS:            ITEM_WEIGHTS,
        ITEM_CATEGORY:           ITEM_CATEGORY,
        ITEM_DURATION_MS:        ITEM_DURATION_MS,
        ITEM_LIFESPAN_MS:        ITEM_LIFESPAN_MS,
        HOLDABLE_EXPIRE_MS:      HOLDABLE_EXPIRE_MS,
        createItemStats:         createItemStats,
        pickItemType:            pickItemType,
        spawnItemCell:           spawnItemCell,
        useHeldItem:             useHeldItem,
        updateItemTimers:        updateItemTimers,
        tickWithItems:           tickWithItems,
      });
    })();
    </script>

    <!-- game.js 로드: type 속성 없음 → file:// 프로토콜 CORS 차단 해소 (BF-522) -->
    <script src="./game.js"></script>
