<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- 전체 화면 캔버스 (100vw × 100vh) — BF-504 AC §1 -->
    <canvas id="game-canvas" aria-label="Snake 게임 캔버스"></canvas>

    <!-- HUD: 우측 상단 Score / High Score — BF-504 AC §1 -->
    <div id="hud" aria-live="polite" aria-label="점수 현황">
      <div class="hud-score" id="hud-score-value" aria-label="현재 점수">0</div>
      <div class="hud-high">
        Best: <span id="hud-high-value">0</span>
      </div>
    </div>

    <!-- Game Over 오버레이 — BF-504 AC §4 -->
    <div id="gameover-overlay" hidden role="dialog" aria-modal="true" aria-label="게임 오버">
      <div class="gameover-box">
        <h2>Game Over</h2>
        <p class="go-score">Score: <span id="go-score">0</span></p>
        <p class="go-hint">Press Space to restart</p>
      </div>
    </div>

    <!-- BF-518: file:// CORS 회避 — 인라인 로직 글로벌 폴백 스크립트
         game.js 의 dynamic import('./logic.js') 가 file:// CORS 차단될 때
         globalThis 에서 아래 변수들을 참조함. HTTP 서빙 시에는 dynamic import 성공으로
         이 인라인 글로벌은 사용되지 않음 (중복 실행 없음). -->
    <script>
    (function () {
      "use strict";
      var CELL = 20;
      var LS_HIGH_SCORE_KEY = "bf-snake-high-score";
      var DIR = {
        UP:    { x:  0, y: -1 },
        DOWN:  { x:  0, y:  1 },
        LEFT:  { x: -1, y:  0 },
        RIGHT: { x:  1, y:  0 },
      };

      function spawnFoodCell(cols, rows, snake) {
        var occupied = new Set(snake.map(function (c) { return c.x + "," + c.y; }));
        var empty = [];
        for (var y = 0; y < rows; y++) {
          for (var x = 0; x < cols; x++) {
            if (!occupied.has(x + "," + y)) empty.push({ x: x, y: y });
          }
        }
        if (empty.length === 0) return null;
        return empty[Math.floor(Math.random() * empty.length)];
      }

      function createInitialState(cols, rows, highScore) {
        if (highScore === undefined) highScore = 0;
        var midX = Math.floor(cols / 2);
        var midY = Math.floor(rows / 2);
        var snake = [
          { x: midX,     y: midY },
          { x: midX - 1, y: midY },
          { x: midX - 2, y: midY },
        ];
        return {
          cols:      cols,
          rows:      rows,
          snake:     snake,
          dir:       DIR.RIGHT,
          nextDir:   DIR.RIGHT,
          food:      spawnFoodCell(cols, rows, snake),
          score:     0,
          highScore: highScore,
          status:    "playing",
        };
      }

      function changeDirection(state, newDir) {
        var cur = state.dir;
        if (cur.x + newDir.x === 0 && cur.y + newDir.y === 0) return state;
        return Object.assign({}, state, { nextDir: newDir });
      }

      function isWallCollision(head, cols, rows) {
        return head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows;
      }

      function isSelfCollision(head, body) {
        return body.some(function (seg) { return seg.x === head.x && seg.y === head.y; });
      }

      function tick(state) {
        if (state.status !== "playing") return state;
        var dir = state.nextDir;
        var head = state.snake[0];
        var newHead = { x: head.x + dir.x, y: head.y + dir.y };
        if (isWallCollision(newHead, state.cols, state.rows)) {
          var hs1 = Math.max(state.highScore, state.score);
          return Object.assign({}, state, { dir: dir, status: "gameover", highScore: hs1 });
        }
        if (isSelfCollision(newHead, state.snake)) {
          var hs2 = Math.max(state.highScore, state.score);
          return Object.assign({}, state, { dir: dir, status: "gameover", highScore: hs2 });
        }
        var ateFood =
          state.food !== null &&
          newHead.x === state.food.x &&
          newHead.y === state.food.y;
        var newSnake = ateFood
          ? [newHead].concat(state.snake)
          : [newHead].concat(state.snake.slice(0, -1));
        var newScore = ateFood ? state.score + 10 : state.score;
        var newFood  = ateFood ? spawnFoodCell(state.cols, state.rows, newSnake) : state.food;
        return Object.assign({}, state, {
          snake:     newSnake,
          dir:       dir,
          food:      newFood,
          score:     newScore,
          highScore: Math.max(state.highScore, newScore),
          status:    "playing",
        });
      }

      function restartGame(state) {
        return createInitialState(state.cols, state.rows, state.highScore);
      }

      // game.js dynamic import 실패(file:// CORS) 시 globalThis 에서 참조 (BF-518)
      Object.assign(globalThis, {
        CELL:               CELL,
        LS_HIGH_SCORE_KEY:  LS_HIGH_SCORE_KEY,
        DIR:                DIR,
        spawnFoodCell:      spawnFoodCell,
        createInitialState: createInitialState,
        changeDirection:    changeDirection,
        isWallCollision:    isWallCollision,
        isSelfCollision:    isSelfCollision,
        tick:               tick,
        restartGame:        restartGame,
      });
    })();
    </script>

    <!-- ES module — logic.js 순수 로직 import 가능 (BF-504)
         BF-518: file:// CORS 차단 시 dynamic import catch → 위 인라인 글로벌로 폴백 -->
    <script type="module" src="./game.js"></script>
  </body>
</html>
