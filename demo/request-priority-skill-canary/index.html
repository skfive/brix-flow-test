<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>요청 우선순위 분류 — /demo/request-priority-skill-canary</title>
  <style>
    :root {
      /* ── 전역 토큰 재사용 (신규 추가 없음 — 기존 demo :root 와 동일) ── */
      --color-primary: #2563EB;
      --color-primary-hover: #1D4ED8;
      --color-primary-soft: #EAF1FE;
      --color-bg: #F7F8FA;
      --color-surface: #FFFFFF;
      --color-border: #E2E5EA;
      --color-text: #1F2430;
      --color-text-muted: #6B7280;
      --color-warning: #D97706;
      --color-warning-soft: #FEF3E2;
      --color-success: #16A34A;
      --color-success-soft: #ECFDF3;
      --color-pending: #9CA3AF;
      --color-pending-soft: #F3F4F6;

      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, "Noto Sans KR", sans-serif;

      --space-1: 4px; --space-2: 8px; --space-3: 12px;
      --space-4: 16px; --space-5: 24px; --space-6: 32px;

      --radius-card: 12px; --radius-item: 10px; --radius-btn: 8px; --radius-pill: 999px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
    }

    .page { max-width: 760px; margin: 0 auto; padding: var(--space-6) var(--space-4); }

    /* ── 헤더 ── */
    .page__header { margin-bottom: var(--space-5); }
    .page__title { font-size: 22px; line-height: 30px; font-weight: 700; margin: 0; }
    .page__subtitle {
      font-size: 14px; line-height: 20px; color: var(--color-text-muted);
      margin: var(--space-1) 0 0;
    }

    .section { margin-bottom: var(--space-5); }
    .section__heading { font-size: 15px; line-height: 22px; font-weight: 600; margin: 0 0 var(--space-3); }

    /* ── 카드 (.panel 재사용) ── */
    .panel {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-card);
      padding: var(--space-4);
    }

    /* ── 축 선택 그룹 (.segmented 확장) ── */
    .field { display: flex; flex-direction: column; margin-bottom: var(--space-4); }
    .field:last-child { margin-bottom: 0; }
    .field__label {
      font-size: 12px; line-height: 16px; font-weight: 500;
      color: var(--color-text-muted); margin-bottom: var(--space-2);
    }
    .axis-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-2); }
    .axis-option {
      font-family: inherit; font-size: 13px; font-weight: 500;
      border: 1px solid var(--color-border); background: var(--color-surface);
      color: var(--color-text-muted); cursor: pointer;
      padding: var(--space-2) var(--space-3); border-radius: var(--radius-pill);
      text-align: center;
    }
    .axis-option:hover { background: var(--color-bg); }
    .axis-option--selected { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
    .axis-option:focus-visible { outline: none; box-shadow: 0 0 0 3px var(--color-primary-soft); }
    @media (max-width: 640px) { .axis-group { grid-template-columns: repeat(2, 1fr); } }

    /* ── 상태 배지 (P1~P4 / error) — §2.1 토큰 매핑 ── */
    .priority-badge {
      display: inline-flex; align-items: center; gap: var(--space-2);
      border-radius: var(--radius-pill); padding: var(--space-2) var(--space-4);
      font-size: 24px; line-height: 30px; font-weight: 700;
    }
    .priority-badge__label { font-size: 14px; font-weight: 600; }
    .priority-badge--p1 { background: var(--color-warning-soft); color: var(--color-warning); }
    .priority-badge--p2 { background: var(--color-primary-soft); color: var(--color-primary); }
    .priority-badge--p3 { background: var(--color-success-soft); color: var(--color-success); }
    .priority-badge--p4 { background: var(--color-pending-soft); color: var(--color-text-muted); }
    .priority-badge--error { background: var(--color-warning-soft); color: var(--color-warning); font-size: 15px; }

    /* pill 소형(매트릭스 셀용) */
    .badge-pill {
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: var(--radius-pill); padding: 2px var(--space-3);
      font-size: 12px; line-height: 16px; font-weight: 600;
    }
    .badge-pill--p1 { background: var(--color-warning-soft); color: var(--color-warning); }
    .badge-pill--p2 { background: var(--color-primary-soft); color: var(--color-primary); }
    .badge-pill--p3 { background: var(--color-success-soft); color: var(--color-success); }
    .badge-pill--p4 { background: var(--color-pending-soft); color: var(--color-text-muted); }

    /* ── 결과 카드 ── */
    .result__combo { font-size: 12px; color: var(--color-text-muted); margin: var(--space-1) 0 0; }
    .result__head { display: flex; align-items: center; gap: var(--space-3); flex-wrap: wrap; }

    /* ── 다음 조치 영역 (AC2 — border-left accent 로 배지와 시각 분리) ── */
    .next-action {
      border-radius: var(--radius-card);
      padding: var(--space-4);
      margin-top: var(--space-4);
      border-left: 4px solid var(--color-border);
      background: var(--color-bg);
    }
    .next-action--p1 { border-left-color: var(--color-warning); background: var(--color-warning-soft); }
    .next-action--p2 { border-left-color: var(--color-primary); background: var(--color-primary-soft); }
    .next-action--p3 { border-left-color: var(--color-success); background: var(--color-success-soft); }
    .next-action--p4 { border-left-color: var(--color-pending); background: var(--color-pending-soft); }
    .next-action__title { font-size: 13px; font-weight: 600; margin: 0 0 var(--space-1); }
    .next-action__body { font-size: 14px; line-height: 20px; margin: 0; }
    .next-action__time { font-size: 12px; font-weight: 500; color: var(--color-text-muted); margin: var(--space-2) 0 0; }

    /* ── 안내(empty/error) — .feedback-form__error 톤 재사용 ── */
    .hint { font-size: 13px; color: var(--color-text-muted); }
    .hint--warn { color: var(--color-warning); }
    .placeholder {
      display: inline-flex; align-items: center;
      border: 1px dashed var(--color-border); border-radius: var(--radius-pill);
      padding: var(--space-2) var(--space-4); color: var(--color-text-muted);
      font-size: 14px; background: var(--color-bg);
    }

    /* ── 참조 매트릭스 ── */
    .matrix { width: 100%; border-collapse: collapse; font-size: 13px; }
    .matrix th, .matrix td {
      border: 1px solid var(--color-border); padding: var(--space-2) var(--space-3); text-align: center;
    }
    .matrix thead th { background: var(--color-bg); font-weight: 600; }
    .matrix tbody th { background: var(--color-bg); font-weight: 600; text-align: left; }
    .matrix td.matrix__cell--selected { outline: 2px solid var(--color-primary); outline-offset: -2px; }
  </style>
</head>
<body>
  <main class="page">
    <header class="page__header">
      <h1 class="page__title">요청 우선순위 분류</h1>
      <p class="page__subtitle">영향도(Impact) × 긴급도(Urgency) 를 선택하면 P1~P4 우선순위와 다음 조치가 즉시 계산됩니다. (로컬 상태 전용 데모)</p>
    </header>

    <!-- 입력 카드 -->
    <div class="panel section">
      <h2 class="section__heading">입력</h2>
      <div class="field">
        <span class="field__label" id="label-impact">영향도 (Impact)</span>
        <div class="axis-group" role="radiogroup" aria-labelledby="label-impact" data-axis="impact"></div>
      </div>
      <div class="field">
        <span class="field__label" id="label-urgency">긴급도 (Urgency)</span>
        <div class="axis-group" role="radiogroup" aria-labelledby="label-urgency" data-axis="urgency"></div>
      </div>
    </div>

    <!-- 결과 카드 -->
    <div class="panel section">
      <h2 class="section__heading">결과</h2>
      <div id="result" aria-live="polite"></div>
    </div>

    <!-- 참조 매트릭스 (기획 §3, 4×4) -->
    <div class="panel section">
      <h2 class="section__heading">Impact × Urgency → P1~P4</h2>
      <table class="matrix">
        <thead>
          <tr>
            <th>Impact \ Urgency</th><th>Immediate</th><th>High</th><th>Medium</th><th>Low</th>
          </tr>
        </thead>
        <tbody id="matrix-body"></tbody>
      </table>
    </div>
  </main>

  <script type="module">
    import {
      classifyRequestPriority,
      UndefinedGradeError,
      PRIORITY_META,
      IMPACTS,
      URGENCIES,
    } from "../../src/demo/request-priority/classify.js";

    // 등급 코드 → 표시명 (기획 §2.1 / §2.2)
    const IMPACT_LABELS = { critical: "Critical", high: "High", medium: "Medium", low: "Low" };
    const URGENCY_LABELS = { immediate: "Immediate", high: "High", medium: "Medium", low: "Low" };

    // 로컬 UI 상태 (기획 §7 RequestPriorityUiState)
    const state = { selectedImpact: null, selectedUrgency: null };

    const axisConfig = {
      impact: { codes: IMPACTS, labels: IMPACT_LABELS, key: "selectedImpact" },
      urgency: { codes: URGENCIES, labels: URGENCY_LABELS, key: "selectedUrgency" },
    };

    // ── 입력 축 버튼 렌더 ──
    for (const [axis, cfg] of Object.entries(axisConfig)) {
      const group = document.querySelector(`.axis-group[data-axis="${axis}"]`);
      cfg.codes.forEach((code) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "axis-option";
        btn.setAttribute("role", "radio");
        btn.setAttribute("aria-checked", "false");
        btn.dataset.code = code;
        btn.textContent = cfg.labels[code];
        btn.addEventListener("click", () => select(axis, code));
        group.appendChild(btn);
      });
      group.addEventListener("keydown", (e) => onArrowNav(e, axis));
    }

    function select(axis, code) {
      const cfg = axisConfig[axis];
      state[cfg.key] = code;
      const group = document.querySelector(`.axis-group[data-axis="${axis}"]`);
      group.querySelectorAll(".axis-option").forEach((btn) => {
        const on = btn.dataset.code === code;
        btn.classList.toggle("axis-option--selected", on);
        btn.setAttribute("aria-checked", on ? "true" : "false");
      });
      render();
    }

    // 좌우 화살표로 옵션 이동 (접근성, 시안 §5.1)
    function onArrowNav(e, axis) {
      if (e.key !== "ArrowRight" && e.key !== "ArrowLeft") return;
      const cfg = axisConfig[axis];
      const current = state[cfg.key];
      const idx = current ? cfg.codes.indexOf(current) : -1;
      const delta = e.key === "ArrowRight" ? 1 : -1;
      const nextIdx = (idx + delta + cfg.codes.length) % cfg.codes.length;
      const nextCode = cfg.codes[nextIdx];
      select(axis, nextCode);
      const group = document.querySelector(`.axis-group[data-axis="${axis}"]`);
      group.querySelector(`.axis-option[data-code="${nextCode}"]`).focus();
      e.preventDefault();
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c],
      );
    }

    function render() {
      const result = document.getElementById("result");
      const { selectedImpact, selectedUrgency } = state;

      // empty — 두 축 중 하나라도 미선택 → 계산하지 않음 (기획 §4)
      if (!selectedImpact || !selectedUrgency) {
        result.innerHTML =
          '<div class="result__head"><span class="placeholder">P?</span></div>' +
          '<p class="hint" style="margin-top: var(--space-3);">두 축을 모두 선택하세요. (미선택 시 우선순위를 계산하지 않습니다.)</p>';
        highlightMatrix(null, null);
        return;
      }

      let outcome;
      try {
        outcome = classifyRequestPriority(selectedImpact, selectedUrgency);
      } catch (err) {
        // error — 정의되지 않은 등급 (폴백 추정 금지, 기획 §4)
        if (err instanceof UndefinedGradeError) {
          result.innerHTML =
            '<div class="result__head"><span class="priority-badge priority-badge--error">정의되지 않은 등급</span></div>' +
            '<p class="hint hint--warn" style="margin-top: var(--space-3);">매트릭스에 없는 등급 코드입니다. 계산을 수행하지 않습니다. (4×4 외 값으로 폴백 추정하지 않음)</p>';
          highlightMatrix(null, null);
          return;
        }
        throw err;
      }

      // resolved — 우선순위 배지 + 다음 조치 (기획 §3.1)
      const { priority, nextAction } = outcome;
      const meta = PRIORITY_META[priority];
      const p = priority.toLowerCase();
      const combo = `${IMPACT_LABELS[selectedImpact]} × ${URGENCY_LABELS[selectedUrgency]}`;
      result.innerHTML =
        `<div class="result__head"><span class="priority-badge priority-badge--${p}">${priority} <span class="priority-badge__label">${escapeHtml(meta.label)}</span></span></div>` +
        `<p class="result__combo">${escapeHtml(combo)}</p>` +
        `<div class="next-action next-action--${p}">` +
        '<p class="next-action__title">다음 조치</p>' +
        `<p class="next-action__body">${escapeHtml(nextAction)}</p>` +
        `<p class="next-action__time">목표 착수 시간: ${escapeHtml(meta.targetTime)}</p>` +
        "</div>";
      highlightMatrix(selectedImpact, selectedUrgency);
    }

    // ── 참조 매트릭스 렌더 ──
    function buildMatrix() {
      const body = document.getElementById("matrix-body");
      IMPACTS.forEach((impact) => {
        const tr = document.createElement("tr");
        const th = document.createElement("th");
        th.textContent = IMPACT_LABELS[impact];
        tr.appendChild(th);
        URGENCIES.forEach((urgency) => {
          const td = document.createElement("td");
          td.dataset.impact = impact;
          td.dataset.urgency = urgency;
          const { priority } = classifyRequestPriority(impact, urgency);
          const p = priority.toLowerCase();
          td.innerHTML = `<span class="badge-pill badge-pill--${p}">${priority}</span>`;
          tr.appendChild(td);
        });
        body.appendChild(tr);
      });
    }

    function highlightMatrix(impact, urgency) {
      document.querySelectorAll("#matrix-body td").forEach((td) => {
        const on = td.dataset.impact === impact && td.dataset.urgency === urgency;
        td.classList.toggle("matrix__cell--selected", on);
      });
    }

    buildMatrix();
    render();
  </script>
</body>
</html>
