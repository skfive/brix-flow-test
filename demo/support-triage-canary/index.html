<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>고객 문의 분류 · Support Triage</title>
    <style>
      :root {
        /* 전역 토큰 재사용 (기존 demo :root, 설계 §2 와 동일 HEX) — 신규/변경 없음 */
        --color-primary: #2563EB;
        --color-primary-hover: #1D4ED8;
        --color-primary-soft: #EAF1FE;
        --color-bg: #F7F8FA;
        --color-surface: #FFFFFF;
        --color-border: #E2E5EA;
        --color-text: #1F2430;
        --color-text-muted: #6B7280;
        --color-warning: #D97706;
        --color-warning-soft: #FEF3E2;
        --color-success: #16A34A;
        --color-success-soft: #ECFDF3;
        --color-pending: #9CA3AF;
        --color-pending-soft: #F3F4F6;

        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                     "Helvetica Neue", Arial, "Noto Sans KR", sans-serif;

        --space-1: 4px; --space-2: 8px; --space-3: 12px;
        --space-4: 16px; --space-5: 24px; --space-6: 32px;

        --radius-card: 12px; --radius-item: 10px; --radius-btn: 8px; --radius-pill: 999px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: var(--font-sans);
        background: var(--color-bg);
        color: var(--color-text);
        line-height: 1.5;
      }

      /* ---- 공통 페이지 골격 (sibling 계승) ---- */
      .page { max-width: 1000px; margin: 0 auto; padding: var(--space-6) var(--space-4); }
      .page__header { margin-bottom: var(--space-5); }
      .page__title { font-size: 22px; line-height: 30px; font-weight: 700; margin: 0; }
      .page__subtitle {
        font-size: 14px; line-height: 20px; color: var(--color-text-muted);
        margin: var(--space-1) 0 0;
      }
      .section { margin-bottom: var(--space-6); }
      .section__heading { font-size: 15px; line-height: 22px; font-weight: 600; margin: 0 0 var(--space-3); }
      .panel {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-card);
        padding: var(--space-4);
      }
      .notice {
        background: var(--color-surface); border: 1px dashed var(--color-border);
        border-radius: var(--radius-card); padding: var(--space-5); text-align: center;
        color: var(--color-text-muted); font-size: 14px;
      }
      .divider { height: 1px; background: var(--color-border); border: 0; margin: var(--space-6) 0; }

      /* ---- 필터 바 (§5.1) ---- */
      .filter-bar {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-card);
        padding: var(--space-4);
        display: flex; flex-direction: column; gap: var(--space-4);
      }
      .filter-group { display: flex; flex-direction: column; gap: var(--space-2); }
      .filter-group__label {
        font-size: 12px; line-height: 16px; font-weight: 600;
        color: var(--color-text-muted); text-transform: none;
      }
      .filter-chips { display: flex; flex-wrap: wrap; gap: var(--space-2); }
      .chip {
        display: inline-flex; align-items: center; gap: var(--space-1);
        font-family: inherit; font-size: 13px; line-height: 18px; font-weight: 500;
        padding: var(--space-1) var(--space-3);
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-pill);
        color: var(--color-text); cursor: pointer;
        transition: border-color .12s ease, color .12s ease, background .12s ease;
      }
      .chip:hover { border-color: var(--color-primary); color: var(--color-primary); }
      .chip:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px var(--color-primary-soft);
        border-color: var(--color-primary);
      }
      .chip[aria-pressed="true"] {
        background: var(--color-primary-soft);
        border-color: var(--color-primary);
        color: var(--color-primary);
        font-weight: 700;
      }
      .chip__glyph { font-size: 13px; }
      .chip__count {
        font-size: 12px; line-height: 16px; font-weight: 500;
        color: var(--color-text-muted); margin-left: var(--space-1);
      }
      .chip[aria-pressed="true"] .chip__count { color: var(--color-primary); }

      /* ---- 결과 요약 줄 ---- */
      .result-bar {
        display: flex; align-items: baseline; justify-content: space-between;
        gap: var(--space-3); margin: var(--space-4) 0 var(--space-3);
        flex-wrap: wrap;
      }
      .result-bar__count { font-size: 14px; font-weight: 600; }
      .result-bar__count strong { color: var(--color-primary); }
      .result-bar__hint { font-size: 12px; color: var(--color-text-muted); }

      /* ---- 문의 리스트/카드 (§5.5) ---- */
      .inquiry-list { display: flex; flex-direction: column; gap: var(--space-3); list-style: none; margin: 0; padding: 0; }
      .inquiry-card {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-left: 4px solid var(--color-pending);
        border-radius: var(--radius-item);
        padding: var(--space-4);
        display: flex; flex-direction: column; gap: var(--space-2);
      }
      .inquiry-card--urgent { border-left-color: var(--color-warning); }
      .inquiry-card--normal { border-left-color: var(--color-pending); }
      .inquiry-card__head { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-3); }
      .inquiry-card__title { font-size: 15px; line-height: 22px; font-weight: 600; margin: 0; }
      .inquiry-card__snippet { font-size: 13px; line-height: 20px; color: var(--color-text-muted); margin: 0; }
      .inquiry-card__meta { display: flex; flex-wrap: wrap; align-items: center; gap: var(--space-2); }
      .inquiry-card__footer {
        display: flex; flex-wrap: wrap; gap: var(--space-2);
        font-size: 12px; line-height: 16px; color: var(--color-text-muted);
      }
      .inquiry-card__footer span::after { content: "·"; margin-left: var(--space-2); color: var(--color-border); }
      .inquiry-card__footer span:last-child::after { content: ""; margin-left: 0; }

      /* ---- 배지/태그 (§5.2 §5.3 §5.4) ---- */
      .priority-badge {
        display: inline-flex; align-items: center; gap: var(--space-1);
        font-size: 12px; line-height: 16px; font-weight: 700;
        padding: 2px var(--space-2); border-radius: var(--radius-pill);
      }
      .priority-badge--urgent { background: var(--color-warning-soft); color: var(--color-warning); }
      .priority-badge--normal { background: var(--color-pending-soft); color: var(--color-text-muted); }

      .area-tag {
        display: inline-flex; align-items: center; gap: var(--space-1);
        font-size: 12px; line-height: 16px; font-weight: 500;
        padding: 2px var(--space-2); border-radius: var(--radius-pill);
        background: var(--color-surface); border: 1px solid var(--color-border);
        color: var(--color-text);
      }

      .status-badge {
        display: inline-flex; align-items: center; gap: var(--space-1);
        font-size: 12px; line-height: 16px; font-weight: 600;
        padding: 2px var(--space-2); border-radius: var(--radius-pill);
        white-space: nowrap;
      }
      .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-pending); }
      .status-badge--new { background: var(--color-primary-soft); color: var(--color-primary); }
      .status-badge--new .status-dot { background: var(--color-primary); }
      .status-badge--progress { background: var(--color-warning-soft); color: var(--color-warning); }
      .status-badge--progress .status-dot { background: var(--color-warning); }
      .status-badge--done { background: var(--color-success-soft); color: var(--color-success); }
      .status-badge--done .status-dot { background: var(--color-success); }

      /* ---- 범례 패널 ---- */
      .legend { display: flex; flex-direction: column; gap: var(--space-3); }
      .legend__row { display: flex; flex-wrap: wrap; align-items: center; gap: var(--space-2); }
      .legend__label { font-size: 12px; font-weight: 600; color: var(--color-text-muted); min-width: 72px; }

      /* ---- 반응형 (§4 breakpoint ≤640px) ---- */
      @media (max-width: 640px) {
        .inquiry-card__head { flex-direction: column; align-items: flex-start; }
        .filter-chips { gap: var(--space-1); }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="page__header">
        <h1 class="page__title">고객 문의 분류</h1>
        <p class="page__subtitle">
          접수된 문의를 우선순위·담당 영역으로 좁혀 긴급 건을 먼저 처리하세요. 각 문의의 처리 상태를 배지로 확인할 수 있습니다.
        </p>
      </header>

      <section class="section" aria-labelledby="filter-heading">
        <h2 class="section__heading" id="filter-heading">필터</h2>
        <div class="filter-bar">
          <div class="filter-group" role="group" aria-label="우선순위 필터">
            <span class="filter-group__label" id="priority-label">우선순위</span>
            <div class="filter-chips" id="priority-chips" aria-labelledby="priority-label"></div>
          </div>
          <div class="filter-group" role="group" aria-label="담당 영역 필터">
            <span class="filter-group__label" id="area-label">담당 영역</span>
            <div class="filter-chips" id="area-chips" aria-labelledby="area-label"></div>
          </div>
        </div>

        <div class="result-bar">
          <span class="result-bar__count" id="result-count" aria-live="polite"></span>
          <span class="result-bar__hint">최신순으로 정렬됩니다</span>
        </div>

        <ul class="inquiry-list" id="inquiry-list" aria-label="문의 목록"></ul>
        <div class="notice" id="empty-state" hidden>
          조건에 맞는 문의가 없습니다. 필터를 변경해 다시 확인해 보세요.
        </div>
      </section>

      <hr class="divider" />

      <section class="section" aria-labelledby="legend-heading">
        <h2 class="section__heading" id="legend-heading">인코딩 범례 · 상태 참조</h2>
        <div class="panel">
          <div class="legend">
            <div class="legend__row">
              <span class="legend__label">우선순위</span>
              <span class="priority-badge priority-badge--urgent"><span aria-hidden="true">🔥</span>긴급</span>
              <span class="priority-badge priority-badge--normal">일반</span>
            </div>
            <div class="legend__row">
              <span class="legend__label">담당 영역</span>
              <span class="area-tag"><span aria-hidden="true">💳</span>결제</span>
              <span class="area-tag"><span aria-hidden="true">👤</span>계정</span>
              <span class="area-tag"><span aria-hidden="true">📦</span>배송</span>
              <span class="area-tag"><span aria-hidden="true">🛠</span>기술</span>
            </div>
            <div class="legend__row">
              <span class="legend__label">처리 상태</span>
              <span class="status-badge status-badge--new"><span class="status-dot" aria-hidden="true"></span>신규</span>
              <span class="status-badge status-badge--progress"><span class="status-dot" aria-hidden="true"></span>처리중</span>
              <span class="status-badge status-badge--done"><span class="status-dot" aria-hidden="true"></span>완료</span>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script type="module">
      import {
        loadInquiries,
        ensureAuthorized,
        filterInquiries,
        countByAxis,
        PRIORITY_META,
        AREA_META,
        STATUS_META,
        DEFAULT_FILTER,
      } from '../../apps/demo/support-triage-canary/triage.js';

      const priorityChipsEl = document.getElementById('priority-chips');
      const areaChipsEl = document.getElementById('area-chips');
      const listEl = document.getElementById('inquiry-list');
      const emptyEl = document.getElementById('empty-state');
      const countEl = document.getElementById('result-count');

      const state = { ...DEFAULT_FILTER };
      let inquiries = [];

      // 필터 칩 옵션: 맨 앞 '전체' + 각 축 옵션
      const priorityOptions = [{ key: 'all', label: '전체' }, ...Object.values(PRIORITY_META)];
      const areaOptions = [{ key: 'all', label: '전체' }, ...Object.values(AREA_META)];

      function makeChip(axis, option, counts) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'chip';
        btn.dataset.axis = axis;
        btn.dataset.key = option.key;
        btn.setAttribute('aria-pressed', String(state[axis] === option.key));
        if (option.glyph) {
          const g = document.createElement('span');
          g.className = 'chip__glyph';
          g.setAttribute('aria-hidden', 'true');
          g.textContent = option.glyph;
          btn.appendChild(g);
        }
        btn.appendChild(document.createTextNode(option.label));
        const count = document.createElement('span');
        count.className = 'chip__count';
        count.textContent = String(counts[option.key] ?? 0);
        btn.appendChild(count);
        btn.addEventListener('click', () => {
          state[axis] = option.key;
          render();
        });
        return btn;
      }

      function renderChips() {
        const priorityCounts = countByAxis(inquiries, 'priority', state);
        const areaCounts = countByAxis(inquiries, 'area', state);
        priorityChipsEl.replaceChildren(
          ...priorityOptions.map((o) => makeChip('priority', o, priorityCounts)),
        );
        areaChipsEl.replaceChildren(...areaOptions.map((o) => makeChip('area', o, areaCounts)));
      }

      function renderCard(inquiry) {
        const li = document.createElement('li');
        li.className = `inquiry-card inquiry-card--${inquiry.priority}`;

        const head = document.createElement('div');
        head.className = 'inquiry-card__head';
        const title = document.createElement('h3');
        title.className = 'inquiry-card__title';
        title.textContent = inquiry.title;
        const statusMeta = STATUS_META[inquiry.status];
        const status = document.createElement('span');
        status.className = `status-badge status-badge--${inquiry.status}`;
        const dot = document.createElement('span');
        dot.className = 'status-dot';
        dot.setAttribute('aria-hidden', 'true');
        status.append(dot, document.createTextNode(statusMeta.label));
        head.append(title, status);

        const snippet = document.createElement('p');
        snippet.className = 'inquiry-card__snippet';
        snippet.textContent = inquiry.snippet;

        const meta = document.createElement('div');
        meta.className = 'inquiry-card__meta';
        const pMeta = PRIORITY_META[inquiry.priority];
        const priorityBadge = document.createElement('span');
        priorityBadge.className = `priority-badge priority-badge--${inquiry.priority}`;
        if (pMeta.glyph) {
          const pg = document.createElement('span');
          pg.setAttribute('aria-hidden', 'true');
          pg.textContent = pMeta.glyph;
          priorityBadge.appendChild(pg);
        }
        priorityBadge.appendChild(document.createTextNode(pMeta.label));
        const aMeta = AREA_META[inquiry.area];
        const areaTag = document.createElement('span');
        areaTag.className = 'area-tag';
        const ag = document.createElement('span');
        ag.setAttribute('aria-hidden', 'true');
        ag.textContent = aMeta.glyph;
        areaTag.append(ag, document.createTextNode(aMeta.label));
        meta.append(priorityBadge, areaTag);

        const footer = document.createElement('div');
        footer.className = 'inquiry-card__footer';
        for (const text of [inquiry.author, inquiry.ticketId, inquiry.receivedLabel]) {
          const s = document.createElement('span');
          s.textContent = text;
          footer.appendChild(s);
        }

        li.append(head, snippet, meta, footer);
        return li;
      }

      function render() {
        renderChips();
        const result = filterInquiries(inquiries, state);
        countEl.innerHTML = `문의 <strong>${result.length}</strong>건`;
        if (result.length === 0) {
          listEl.replaceChildren();
          listEl.hidden = true;
          emptyEl.hidden = false;
          return;
        }
        listEl.hidden = false;
        emptyEl.hidden = true;
        listEl.replaceChildren(...result.map(renderCard));
      }

      async function init() {
        if (!ensureAuthorized(window)) {
          document.querySelector('.page').innerHTML =
            '<div class="notice">접근 권한이 필요합니다.</div>';
          return;
        }
        inquiries = await loadInquiries();
        render();
      }

      init();
    </script>
  </body>
</html>
