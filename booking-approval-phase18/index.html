<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 예약 승인 — booking-approval-phase18</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="bk-page">

  <!-- ── 헤더 ── -->
  <header class="bk-header">
    <h1>팀 예약 승인</h1>
    <p class="bk-subtitle">공유 자원 예약 요청을 검토하고 승인·반려합니다. 이미 승인된 예약과 시간이 겹치는 요청은 승인이 차단됩니다.</p>
  </header>

  <!-- ── 저장 안내(§8.3 임시 세션) — localStorage 저장 실패 시에만 노출 ── -->
  <p class="bk-storage-note" data-testid="storage-note" role="status" hidden>임시 세션입니다 — 이 브라우저에 변경 사항이 저장되지 않습니다.</p>

  <!-- ── 필터 바 (§5.1) ── -->
  <section class="bk-panel bk-filters" data-testid="filter-bar" aria-label="예약 목록 필터">
    <h2 class="bk-region-title">필터</h2>
    <div class="bk-filters__row">
      <div class="bk-field">
        <label for="filter-resource">자원</label>
        <select id="filter-resource" data-field="filter-resource">
          <option value="all">전체 자원</option>
          <option value="room-01">3층 세미나실</option>
          <option value="room-02">4층 소회의실 A</option>
          <option value="room-03">4층 소회의실 B</option>
        </select>
      </div>
      <div class="bk-field">
        <label for="filter-status">상태</label>
        <select id="filter-status" data-field="filter-status">
          <option value="all">전체 상태</option>
          <option value="requested">대기 (requested)</option>
          <option value="approved">승인 (approved)</option>
          <option value="rejected">반려 (rejected)</option>
        </select>
      </div>
    </div>
  </section>

  <!-- ── 신규 예약 요청 폼 (§5.2) ── -->
  <section class="bk-panel" aria-label="신규 예약 요청">
    <h2 class="bk-region-title">신규 예약 요청</h2>
    <form class="bk-form" data-testid="booking-form">
      <div class="bk-form__grid">
        <div class="bk-field">
          <label for="f-resource">자원</label>
          <select id="f-resource" data-field="resourceId">
            <option value="room-01">3층 세미나실</option>
            <option value="room-02">4층 소회의실 A</option>
            <option value="room-03">4층 소회의실 B</option>
          </select>
        </div>
        <div class="bk-field">
          <label for="f-requester">신청자명</label>
          <input id="f-requester" type="text" data-field="requesterName" placeholder="예: 오세훈">
        </div>
        <div class="bk-field">
          <label for="f-start">시작 시각</label>
          <input id="f-start" type="datetime-local" data-field="startAt" value="2026-07-27T09:00">
        </div>
        <div class="bk-field">
          <label for="f-end">종료 시각</label>
          <input id="f-end" type="datetime-local" data-field="endAt" value="2026-07-27T10:00">
        </div>
      </div>
      <div class="bk-form__footer">
        <p class="bk-form-error" data-testid="form-error" role="alert"></p>
        <button type="submit" class="bk-btn bk-btn--submit" data-testid="submit-booking">예약 요청 ▸</button>
      </div>
    </form>
  </section>

  <!-- ── 충돌 안내 배너 (§5.4) — 평소 hidden, 승인 CONFLICT 시 노출 ── -->
  <div class="bk-banner" data-testid="conflict-banner" role="alert" hidden>
    <span class="bk-banner__icon" aria-hidden="true">⚠</span>
    <div class="bk-banner__body">
      <p class="bk-banner__text">이미 승인된 예약과 시간이 겹쳐 승인할 수 없습니다.</p>
      <p class="bk-banner__detail" data-testid="conflict-detail"></p>
    </div>
    <button type="button" class="bk-banner__close" data-testid="conflict-close" aria-label="닫기">×</button>
  </div>

  <!-- ── 예약 목록 (§5.5) — app.js 가 state 기준으로 렌더 ── -->
  <section aria-label="예약 목록">
    <h2 class="bk-region-title">예약 목록</h2>
    <div class="bk-list" data-testid="booking-list"></div>
  </section>

</main>

<script src="booking.js"></script>
<script src="app.js"></script>
</body>
</html>
