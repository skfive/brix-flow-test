<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TETRIS</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<!-- 명세 §9.3: body data-status / data-theme -->
<body data-status="start" data-theme="dark">

  <!-- ==================== Topbar (명세 §4.4) ==================== -->
  <header class="topbar">
    <span class="topbar-title">TETRIS</span>
    <div class="topbar-actions">
      <button class="btn-icon" id="theme-toggle" title="테마 전환" aria-label="테마 전환">🌙</button>
    </div>
  </header>

  <!-- ==================== 모바일 HUD (< 640px) ==================== -->
  <div class="mobile-hud">
    <div class="hud-panel">
      <span class="hud-label">SCORE</span>
      <span class="hud-value" id="m-score-value">000000</span>
    </div>
    <div class="hud-panel">
      <span class="hud-label">LEVEL</span>
      <span class="hud-value" id="m-level-value">1</span>
    </div>
    <div class="hud-panel">
      <span class="hud-label">LINES</span>
      <span class="hud-value" id="m-lines-value">0</span>
    </div>
  </div>

  <!-- ==================== 게임 컨테이너 ==================== -->
  <main class="game-container">

    <!-- 좌측 HUD (명세 §4.5 Desktop) -->
    <aside class="hud hud--left">

      <!-- SCORE 패널 (명세 §5.2) -->
      <div class="hud-panel hud-score">
        <span class="hud-label">SCORE</span>
        <span class="hud-value" id="score-value">000000</span>
        <span class="hud-label hud-label--sub">BEST</span>
        <span class="hud-value hud-value--sub" id="best-value">000000</span>
      </div>

      <!-- LEVEL 패널 (명세 §5.5) -->
      <div class="hud-panel hud-level">
        <span class="hud-label">LEVEL</span>
        <span class="hud-value" id="level-value">1</span>
        <div class="speed-indicator">
          <span class="speed-bar"></span>
          <span class="speed-bar"></span>
          <span class="speed-bar"></span>
        </div>
      </div>

      <!-- LINES 패널 (명세 §5.6) -->
      <div class="hud-panel hud-lines">
        <span class="hud-label">LINES</span>
        <span class="hud-value" id="lines-value">0</span>
      </div>

      <!-- HOLD 미리보기 (명세 §5.4) -->
      <div class="hud-panel hud-hold">
        <span class="hud-label">HOLD</span>
        <div class="piece-preview" id="hold-piece-grid"></div>
      </div>

      <!-- 키보드 안내 (명세 §5.9) -->
      <div class="hud-panel hud-key-guide" aria-label="키보드 조작 안내">
        <span class="key-guide-title">CONTROLS</span>
        <div class="key-row"><kbd class="key-badge">← →</kbd><span class="key-desc">좌우 이동</span></div>
        <div class="key-row"><kbd class="key-badge">↓ / S</kbd><span class="key-desc">소프트 드롭</span></div>
        <div class="key-row"><kbd class="key-badge">↑ / W</kbd><span class="key-desc">시계방향 회전</span></div>
        <div class="key-row"><kbd class="key-badge">Z</kbd><span class="key-desc">반시계 회전</span></div>
        <div class="key-row"><kbd class="key-badge">Space</kbd><span class="key-desc">하드 드롭</span></div>
        <div class="key-row"><kbd class="key-badge">C</kbd><span class="key-desc">홀드</span></div>
        <div class="key-row"><kbd class="key-badge">P / Esc</kbd><span class="key-desc">일시정지</span></div>
        <div class="key-row"><kbd class="key-badge">R</kbd><span class="key-desc">재시작</span></div>
      </div>

    </aside>

    <!-- ==================== 게임 보드 (명세 §9.3) ==================== -->
    <section class="board-wrapper">
      <div
        class="board"
        id="game-board"
        role="img"
        aria-label="테트리스 게임 보드"
      >
        <!-- 200개 셀 — JS에서 동적 생성 (명세 §9.4) -->
      </div>

      <!-- 시작 오버레이 -->
      <div
        class="overlay overlay--start overlay--active"
        id="overlay-start"
        role="dialog"
        aria-label="게임 시작"
        aria-hidden="false"
      >
        <div class="overlay-modal">
          <div class="overlay-icon">🎮</div>
          <div class="overlay-title overlay-title--start">TETRIS</div>
          <div class="overlay-actions">
            <button class="btn btn--primary" id="btn-start">▶ 게임 시작</button>
          </div>
          <p class="start-highscore" id="start-best">BEST: <span>000000</span></p>
        </div>
      </div>

      <!-- 일시정지 오버레이 (명세 §5.7) -->
      <div
        class="overlay overlay--pause"
        id="overlay-pause"
        role="dialog"
        aria-label="일시정지"
        aria-hidden="true"
      >
        <div class="overlay-modal">
          <div class="overlay-icon">⏸</div>
          <div class="overlay-title overlay-title--pause">PAUSED</div>
          <div class="overlay-actions">
            <button class="btn btn--primary" id="btn-pause-resume">
              ▶ 계속하기 <small style="opacity:0.7;font-size:11px">(P)</small>
            </button>
            <button class="btn btn--secondary" id="btn-pause-restart">↺ 다시 시작</button>
            <button class="btn btn--danger" id="btn-pause-quit">✕ 메뉴로</button>
          </div>
        </div>
      </div>

      <!-- 게임오버 오버레이 (명세 §5.8) -->
      <div
        class="overlay overlay--gameover"
        id="overlay-gameover"
        role="dialog"
        aria-label="게임 오버"
        aria-hidden="true"
      >
        <div class="overlay-modal">
          <div class="overlay-icon">💀</div>
          <div class="overlay-title overlay-title--danger">GAME OVER</div>
          <div class="overlay-stats">
            <div class="stat-row">
              <span class="stat-label">SCORE</span>
              <span class="stat-value" id="go-score">000000</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">BEST</span>
              <span class="stat-value stat-value--record" id="go-best">000000</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">LEVEL</span>
              <span class="stat-value" id="go-level">1</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">LINES</span>
              <span class="stat-value" id="go-lines">0</span>
            </div>
          </div>
          <span class="new-record-badge" id="go-new-record" style="display:none">🏆 NEW RECORD!</span>
          <div class="overlay-actions">
            <button class="btn btn--primary" id="btn-go-newgame">▶ 새 게임</button>
            <button class="btn btn--secondary" id="btn-go-quit">↩ 메뉴로</button>
          </div>
        </div>
      </div>

    </section>

    <!-- 우측 HUD (명세 §4.5 Desktop) -->
    <aside class="hud hud--right">

      <!-- NEXT 미리보기 (명세 §5.3) -->
      <div class="hud-panel hud-next">
        <span class="hud-label">NEXT</span>
        <div class="piece-preview" id="next-piece-grid"></div>
      </div>

      <!-- 우측 SCORE (Tablet 대비) -->
      <div class="hud-panel hud-score">
        <span class="hud-label">SCORE</span>
        <span class="hud-value" style="font-size:20px" id="r-score-value">000000</span>
      </div>
      <div class="hud-panel hud-level">
        <span class="hud-label">LEVEL</span>
        <span class="hud-value" style="font-size:20px" id="r-level-value">1</span>
        <div class="speed-indicator">
          <span class="speed-bar"></span>
          <span class="speed-bar"></span>
          <span class="speed-bar"></span>
        </div>
      </div>
      <div class="hud-panel hud-lines">
        <span class="hud-label">LINES</span>
        <span class="hud-value" style="font-size:20px; color: var(--tetro-S)" id="r-lines-value">0</span>
      </div>

    </aside>

  </main>

  <!-- logic.js: type 없음 → file:// CORS 안전 -->
  <script src="./logic.js"></script>
  <!-- storage.js -->
  <script src="./storage.js"></script>
  <!-- main.js -->
  <script src="./main.js"></script>

</body>
</html>
