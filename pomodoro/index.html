<!doctype html>
<html lang="ko" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>뽀모도로</title>
    <link rel="stylesheet" href="./styles.css" />
    <script>
      // BF-432 · 다크 default 강제 (명세 §6.6) — flicker 방지 위해 head 인라인
      (function () {
        try {
          var saved = localStorage.getItem("bf-theme");
          var theme = saved === "light" || saved === "dark" ? saved : "dark";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (_e) {
          // localStorage 사용 불가 환경 (private mode 등) — default 다크 유지
        }
      })();
    </script>
  </head>
  <body>
    <header class="topbar">
      <h1 class="topbar__title">뽀모도로</h1>
      <div class="topbar__actions">
        <span class="focus-total" id="focus-total" aria-live="polite" aria-label="오늘 누적 집중 시간">
          오늘 <span class="focus-total__value" id="focus-total-value">0분</span>
        </span>
        <button
          type="button"
          class="btn btn--ghost"
          id="theme-toggle"
          aria-label="테마 전환"
        >
          🌙
        </button>
      </div>
    </header>

    <main class="page">
      <section
        class="card pomodoro"
        id="pomodoro-card"
        aria-label="뽀모도로 타이머"
        data-mode="FOCUS"
      >
        <!-- 모드 배지 -->
        <div class="mode-badge mode-zone" id="mode-badge" aria-live="polite">
          <span class="mode-badge__label" id="mode-label">FOCUS</span>
        </div>

        <!-- 사이클 dot -->
        <div
          class="cycle-dots"
          id="cycle-dots"
          role="img"
          aria-label="사이클 진행: 4개 중 0개 완료"
        >
          <span class="dot" data-index="1"></span>
          <span class="dot" data-index="2"></span>
          <span class="dot" data-index="3"></span>
          <span class="dot" data-index="4"></span>
        </div>

        <!-- 대형 카운트다운 -->
        <div
          class="countdown mode-zone"
          id="countdown"
          role="timer"
          aria-live="off"
          aria-label="남은 시간"
        >
          <span class="countdown__minutes" id="disp-m">25</span>
          <span class="countdown__colon" aria-hidden="true">:</span>
          <span class="countdown__seconds" id="disp-s">00</span>
        </div>

        <!-- 컨트롤 3종 -->
        <div class="controls">
          <button
            type="button"
            class="btn btn--primary-lg mode-zone"
            id="btn-primary"
          >
            ▶ Start
          </button>
          <button type="button" class="btn btn--ghost-lg" id="btn-reset">
            ⟲ Reset
          </button>
          <button type="button" class="btn btn--ghost-lg" id="btn-skip">
            ⤼ Skip
          </button>
        </div>

        <!-- 사이클 카운터 -->
        <p class="cycle-counter" id="cycle-counter">
          사이클 <span class="cycle-counter__n" id="cycle-n">1</span> / 4
        </p>
      </section>

      <p class="kbd-hint">
        <kbd>Space</kbd> 시작/정지 ·
        <kbd>R</kbd> 리셋 ·
        <kbd>S</kbd> Skip ·
        <kbd>T</kbd> 테마
      </p>
    </main>

    <!-- 인앱 toast (Notification API 금지 — 명세 §1.3) -->
    <div class="toast-stack" id="toast-stack" role="status" aria-live="polite"></div>

    <!-- 비-module script — file:// CORS 안전 (명세 §7.7) -->
    <script src="./storage.js"></script>
    <script src="./timer.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
